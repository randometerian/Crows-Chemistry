    const submergedInWater = nearbyWater.length >= 3 && nearbyWater.some(w => moleculeCenter(w).y < center.y + 22);
    const isDragged = world.dragging.mol && world.dragging.mol.id === mol.id;

    if (!mol.dissolved && mol.phase === 'gas' && nearbyWater.length >= 3) {
      const absorbChance = clamp(
        (Math.max(0, pressureAtm - 1) * 0.020 + coldBoost * 0.010 + 0.004 + (submergedInWater ? 0.020 : 0) + (isDragged ? 0.012 : 0)) *
        nearbyWater.length * 0.12 * stirBoost * dt * 60,
        0,
        submergedInWater ? 0.45 : 0.22
      );
      if (Math.random() < absorbChance) {
        setMoleculeDissolvedState(mol, true);
        for (const atom of mol.atoms) {
          atom.vx *= 0.35;
          atom.vy *= 0.35;
        }
        addReactionLog('solution', 'CO2 dissolved into water, forming carbonated water', {
          source: 'carbonation',
          x: center.x,
          y: center.y
        });
      }
      continue;
    }

    if (mol.dissolved) {
      const nearbyWaterSupport = nearbyWater.length >= 2;
      const releaseChance = clamp(
        (Math.max(0, 1.35 - pressureAtm) * 0.030 + warmPenalty * 0.018 + (world.stirring.timeLeft > 0 && pressureAtm < 1.6 ? 0.012 : 0)) *
        dt * 60,
        0,
        0.20
      );
      if (!nearbyWaterSupport || Math.random() < releaseChance) {
        setMoleculeDissolvedState(mol, false);
        const releaseCenter = moleculeCenter(mol);
        for (const atom of mol.atoms) {
          atom.vx += rand(-0.20, 0.20);
          atom.vy -= rand(0.35, 0.90);
        }
        addReactionLog('solution', 'Carbonated water released CO2 bubbles', {
          source: 'carbonation',
          x: releaseCenter.x,
          y: releaseCenter.y
        });
      }
    }
  }
}

function handleAqueousIonChemistry(dt, ambientTempC, pressureAtm) {
  const waterChem = getWaterChemistrySnapshot();
  if (!waterChem || waterChem.waterCount < 2) return;

  const dissolvedCO2 = world.molecules.filter(m => m.alive && m.type === 'CO2' && m.dissolved);
  if (!dissolvedCO2.length) return;

  const aqueousNaOH = world.molecules.filter(m => m.alive && m.type === 'NaOH' && isWaterPhaseMolecule(m));
  if (!aqueousNaOH.length) return;

  const stirBoost = world.stirring.timeLeft > 0 ? 1.4 : 1;
  const coolBonus = clamp((30 - ambientTempC) / 25, 0.7, 1.35);
  const pressureBoost = clamp(0.75 + Math.max(0, pressureAtm - 1) * 0.35, 0.75, 1.7);

  for (const co2 of dissolvedCO2) {
    if (!co2.alive) continue;
    const center = moleculeCenter(co2);
    const nearbyBase = aqueousNaOH
      .filter(m => m.alive && dist(center, moleculeCenter(m)) <= 150)
      .sort((a, b) => dist(center, moleculeCenter(a)) - dist(center, moleculeCenter(b)));
    if (!nearbyBase.length) continue;

    const stronglyBasic = waterChem.pH >= 10.2 && nearbyBase.length >= 2;
    const targetType = stronglyBasic ? 'Na2CO3' : 'NaHCO3';
    const baseNeeded = stronglyBasic ? 2 : 1;
    if (nearbyBase.length < baseNeeded) continue;

    const chance = clamp((0.010 + nearbyBase.length * 0.012) * stirBoost * coolBonus * pressureBoost * dt * 60, 0, 0.24);
    if (Math.random() >= chance) continue;

    const consumedBase = nearbyBase.slice(0, baseNeeded);
    co2.alive = false;
    for (const base of consumedBase) base.alive = false;

    const product = spawnSpecies(targetType, center.x + rand(-8, 8), center.y + rand(-8, 8));
    const water = stronglyBasic ? spawnSpecies('H2O', center.x + rand(-14, 14), center.y + rand(-10, 10)) : null;

    if (product && DISSOLUTION_CONFIG[targetType]) setMoleculeDissolvedState(product, true);
    if (water) {
      for (const atom of water.atoms) {
        atom.vx *= 0.35;
        atom.vy *= 0.35;
      }
    }

    world.stats.reactions += 1;
    addReactionLog(
      'solution',
      stronglyBasic
        ? 'Dissolved CO2 reacted with aqueous NaOH to form carbonate'
        : 'Dissolved CO2 reacted with aqueous NaOH to form bicarbonate',
      { source: stronglyBasic ? 'aqueous_carbonate' : 'aqueous_bicarbonate', x: center.x, y: center.y }
    );
    markSidebarDirty();
  }
}

function handlePhaseTransitions(dt, ambientTempC, pressureAtm) {
  const b = world.bounds;
  for (const mol of world.molecules) {
    if (!mol.alive) continue;
    const config = EVAPORATION_CONFIG[mol.type];
    if (!config) continue;

    const center = moleculeCenter(mol);
    const yNorm = clamp((center.y - b.y) / Math.max(1, b.h), 0, 1);
    const pressureShift = (pressureAtm - 1) * 28;
    const boilC = config.boilC + pressureShift;
    const condenseC = config.condenseC + pressureShift * 0.8;

    if (mol.phase === 'liquid' && ambientTempC > boilC) {
      const excess = ambientTempC - boilC;
      const surfaceBias = clamp(1.25 - yNorm, 0.45, 1.35);
      const chance = clamp((0.0004 + excess / 5200) * config.evapRate * surfaceBias * dt * 60, 0, 0.18);
      if (Math.random() < chance) {
        setMoleculePhaseMode(mol, 'gas');
        for (const atom of mol.atoms) {
          atom.vx += rand(-0.45, 0.45);
          atom.vy -= rand(0.2, 0.9);
        }
        applyThermalImpulse(config.coolDeltaC, `${mol.display} evaporated`, {
          x: center.x,
          y: center.y,
          label: `${getSpeciesDisplayLabel(mol.type)} vapor`,
          source: mol.type
        });
      }
      continue;
    }

    if (mol.phase === 'gas' && ambientTempC < condenseC) {
      const deficit = condenseC - ambientTempC;
      const sinkBias = clamp(yNorm + 0.15, 0.30, 1.20);
      const chance = clamp((0.0003 + deficit / 6000) * sinkBias * dt * 60, 0, 0.12);
      if (Math.random() < chance) {
        setMoleculePhaseMode(mol, 'liquid');
        for (const atom of mol.atoms) {
          atom.vx *= 0.72;
          atom.vy += rand(0.1, 0.4);
        }
        applyThermalImpulse(Math.abs(config.coolDeltaC) * 0.55, `${mol.display} condensed`, {
          x: center.x,
          y: center.y,
          label: `${getSpeciesDisplayLabel(mol.type)} condensate`,
          source: mol.type
        });
      }
    }
  }
}

function handleBleachAcetone(dt, ambientTempC) {
  const acetones = world.molecules.filter(m => m.alive && m.type === 'acetone');
  const bleaches = world.molecules.filter(m => m.alive && m.type === 'NaOCl');
  if (acetones.length === 0 || bleaches.length < 3) return;

  const tempPenalty = ambientTempC < 5 ? 0.20 : ambientTempC > 85 ? 0.45 : 1.0;
  const tempPeak = Math.exp(-Math.pow((ambientTempC - 42) / 26, 2));
  const contactGain = (0.010 + 0.030 * tempPeak * tempPenalty) * (dt * 60);
  const decay = Math.max(0, 1 - dt * 1.8);

  for (const ac of acetones) {
    if (!ac.alive) continue;
    const cA = moleculeCenter(ac);
    const near = bleaches
      .filter(b => b.alive)
      .map(b => ({ mol: b, d: dist(cA, moleculeCenter(b)) }))
      .filter(x => x.d < 320)
      .sort((a, b) => a.d - b.d);
    ac.bleachReactionProgress = (ac.bleachReactionProgress || 0) * decay;
    if (near.length < 3) continue;

    const recruited = near.slice(0, 3);
    const recruitCenter = {
      x: (cA.x + recruited[0].mol.atoms.reduce((s, a) => s + a.x, 0) / recruited[0].mol.atoms.length + recruited[1].mol.atoms.reduce((s, a) => s + a.x, 0) / recruited[1].mol.atoms.length + recruited[2].mol.atoms.reduce((s, a) => s + a.x, 0) / recruited[2].mol.atoms.length) / 4,
      y: (cA.y + recruited[0].mol.atoms.reduce((s, a) => s + a.y, 0) / recruited[0].mol.atoms.length + recruited[1].mol.atoms.reduce((s, a) => s + a.y, 0) / recruited[1].mol.atoms.length + recruited[2].mol.atoms.reduce((s, a) => s + a.y, 0) / recruited[2].mol.atoms.length) / 4
    };
    const tempWindow = Math.exp(-Math.pow((ambientTempC - 42) / 26, 2));
    attractMoleculeTowardPoint(ac, recruitCenter, 0.040 + tempWindow * 0.070, dt);
    for (const item of recruited) {
      attractMoleculeTowardPoint(item.mol, cA, 0.032 + tempWindow * 0.060, dt);
    }

    const tightCluster = recruited.every(x => x.d < 190);
    if (!tightCluster) continue;

    const crowdBoost = clamp(near.length / 5, 0.8, 1.9);
    const intactBoost = isClosedShellMolecule(ac) ? 1.18 : 0.65;
    const bleachIntegrity = recruited.every(x => isClosedShellMolecule(x.mol)) ? 1.20 : 0.70;
    const closeness = recruited.reduce((sum, item) => sum + clamp((220 - item.d) / 220, 0, 1), 0) / recruited.length;
    ac.bleachReactionProgress += contactGain * crowdBoost * intactBoost * bleachIntegrity * (0.55 + closeness);
    if (ac.bleachReactionProgress < 1) continue;
    ac.bleachReactionProgress = 0;

    const b1 = recruited[0].mol;
    const b2 = recruited[1].mol;
    const b3 = recruited[2].mol;
    b1.alive = false;
    b2.alive = false;
    b3.alive = false;
    ac.alive = false;

    const mid = {
      x: (cA.x + moleculeCenter(b1).x + moleculeCenter(b2).x + moleculeCenter(b3).x) / 4,
      y: (cA.y + moleculeCenter(b1).y + moleculeCenter(b2).y + moleculeCenter(b3).y) / 4
    };

    const p1 = addMolecule('CHCl3', mid.x - 24, mid.y - 8, { select: false });
    const p2 = addMolecule('NaC2H3O2', mid.x + 18, mid.y + 12, { select: false });
    const p3 = addMolecule('NaCl', mid.x + 42, mid.y - 10, { select: false });
    const p4 = addMolecule('NaCl', mid.x - 42, mid.y + 8, { select: false });
    const p5 = addMolecule('H2O', mid.x + rand(-10, 10), mid.y + rand(-10, 10), { select: false });

    for (const a of [...p1.atoms, ...p2.atoms, ...p3.atoms, ...p4.atoms, ...p5.atoms]) {
      a.vx += rand(-0.8, 0.8);
      a.vy += rand(-0.7, 0.7);
    }

    world.stats.reactions += 1;
    addReactionLog(
      'pathway',
      'Bleach + acetone pathway: acetone + 3 NaOCl -> CHCl3 + NaC2H3O2 + 2 NaCl + H2O'
    );
    markSidebarDirty();
    break;
  }
}

function handleWaterReaction(heatLevel) {
  if (heatLevel < 0.20) return;

  const hydrogens = world.molecules.filter(m => m.alive && m.type === 'H2');
  const oxygens = world.molecules.filter(m => m.alive && m.type === 'O2');
  if (hydrogens.length < 1 || oxygens.length < 1) return;

  for (const o2 of oxygens) {
    if (!o2.alive) continue;

    const cO = moleculeCenter(o2);
    const velO = moleculeVelocity(o2);
    const candidates = hydrogens
      .filter(h => h.alive)
      .map(h => {
        const cH = moleculeCenter(h);
        const vH = moleculeVelocity(h);
        const relSpeed = Math.hypot(vH.vx - velO.vx, vH.vy - velO.vy);
        return { mol: h, d: dist(cH, cO), relSpeed };
      })
      .filter(x => x.d < 90 && x.relSpeed > 0.8)
      .sort((a, b) => a.d - b.d);

    if (candidates.length < 1) continue;

    const hotWaterChance = clamp(0.004 + heatLevel * 0.05, 0, 0.25);
    const peroxideWindow = Math.exp(-Math.pow(heatLevel - 0.40, 2) / 0.035);
    const peroxideChance = clamp(0.001 + peroxideWindow * 0.018, 0, 0.12);

    if (candidates.length >= 2 && Math.random() < hotWaterChance) {
      const hA = candidates[0].mol;
      const hB = candidates[1].mol;
      const c1 = moleculeCenter(hA);
      const c2 = moleculeCenter(hB);
      const midX = (c1.x + c2.x + cO.x) / 3;
      const midY = (c1.y + c2.y + cO.y) / 3;

      hA.alive = false;
      hB.alive = false;
      o2.alive = false;

      const w1 = addMolecule('H2O', midX - 24, midY - 8, { select: false });
      const w2 = addMolecule('H2O', midX + 24, midY + 8, { select: false });

      for (const a of [...w1.atoms, ...w2.atoms]) {
        a.vx += rand(-1.4, 1.4);
        a.vy += rand(-1.2, 0.6) - heatLevel * 0.25;
      }

      world.stats.reactions += 1;
      markSidebarDirty();
      break;
    }

    if (Math.random() < peroxideChance) {
      const hA = candidates[0].mol;
      const c1 = moleculeCenter(hA);
      const midX = (c1.x + cO.x) * 0.5;
      const midY = (c1.y + cO.y) * 0.5;

      hA.alive = false;
      o2.alive = false;
      const p = addMolecule('H2O2', midX, midY, { select: false });
      for (const a of p.atoms) {
        a.vx += rand(-0.9, 0.9);
        a.vy += rand(-0.8, 0.8);
      }

      world.stats.reactions += 1;
      markSidebarDirty();
      break;
    }
  }
}

function handleAtomicBonding(heatLevel) {
  const atomsH = world.molecules.filter(m => m.alive && m.type === 'atom-H');
  const atomsO = world.molecules.filter(m => m.alive && m.type === 'atom-O');
  const coolingFactor = clamp(1.15 - heatLevel, 0.08, 1.2);

  for (let i = 0; i < atomsH.length; i++) {
    const a = atomsH[i];
    if (!a.alive) continue;
    const ca = moleculeCenter(a);
    for (let j = i + 1; j < atomsH.length; j++) {
      const b = atomsH[j];
      if (!b.alive) continue;
      const cb = moleculeCenter(b);
      if (dist(ca, cb) > 52) continue;
      if (Math.random() < 0.012 * coolingFactor) {
        a.alive = false;
        b.alive = false;
        addMolecule('H2', (ca.x + cb.x) * 0.5, (ca.y + cb.y) * 0.5, { select: false });
        world.stats.reactions += 1;
        break;
      }
    }
  }

  for (let i = 0; i < atomsO.length; i++) {
    const a = atomsO[i];
    if (!a.alive) continue;
    const ca = moleculeCenter(a);
    for (let j = i + 1; j < atomsO.length; j++) {
      const b = atomsO[j];
      if (!b.alive) continue;
      const cb = moleculeCenter(b);
      if (dist(ca, cb) > 58) continue;
      if (Math.random() < 0.008 * coolingFactor) {
        a.alive = false;
        b.alive = false;
        addMolecule('O2', (ca.x + cb.x) * 0.5, (ca.y + cb.y) * 0.5, { select: false });
        world.stats.reactions += 1;
        break;
      }
    }
  }

  for (const o of atomsO) {
    if (!o.alive) continue;
    const co = moleculeCenter(o);
    const nearH = atomsH.filter(h => h.alive && dist(moleculeCenter(h), co) < 62).slice(0, 2);
    if (nearH.length < 2) continue;
    if (Math.random() < 0.006 * coolingFactor) {
      o.alive = false;
      nearH[0].alive = false;
      nearH[1].alive = false;
      addMolecule('H2O', co.x + rand(-8, 8), co.y + rand(-8, 8), { select: false });
      world.stats.reactions += 1;
    }
  }
}

function maybeDecomposePeroxide(heatLevel) {
  if (heatLevel < 0.68) return;
  const peroxides = world.molecules.filter(m => m.alive && m.type === 'H2O2');
  for (const p of peroxides) {
    if (Math.random() > (0.002 + heatLevel * 0.01)) continue;
    const c = moleculeCenter(p);
    p.alive = false;
    const w = addMolecule('H2O', c.x - 16, c.y + 4, { select: false });
    const o = addAtom('O', c.x + 20, c.y - 6, { select: false });
    for (const a of [...w.atoms, ...o.atoms]) {
      a.vx += rand(-1.2, 1.2);
      a.vy += rand(-1.1, 0.8);
    }
    world.stats.reactions += 1;
    break;
  }
}

function toSelectedUnitTemp(celsius) {
  if (world.ui.tempInputUnit === 'F') return cToF(celsius);
  if (world.ui.tempInputUnit === 'K') return cToK(celsius);
  return celsius;
}

function selectedUnitToCelsius(value) {
  if (world.ui.tempInputUnit === 'F') return fToC(value);
  if (world.ui.tempInputUnit === 'K') return kToC(value);
  return value;
}

function updateThermalLabels() {
  const c = Math.round(world.temperatureC);
  const f = Math.round(cToF(c));
  const k = Math.round(cToK(c));
  const pulse = Math.round(world.heatPulseC);
  const ambientC = Math.round(getEffectiveTemperatureC());
  const ambientF = Math.round(cToF(ambientC));
  const ambientK = Math.round(cToK(ambientC));
  const effectivePressureAtm = getEffectivePressureAtm();
  const waterChem = getWaterChemistrySnapshot();
  const min = Number(heatSlider.min);
  const max = Number(heatSlider.max);
  const fill = ((world.temperatureC - min) / (max - min)) * 100;
  const doseFill = ((Math.abs(world.heatDoseC) - Number(heatDoseSlider.min)) / (Number(heatDoseSlider.max) - Number(heatDoseSlider.min))) * 100;
  const pressureFill = ((world.pressureAtm - Number(pressureSlider.min)) / (Number(pressureSlider.max) - Number(pressureSlider.min))) * 100;
  heatSlider.style.setProperty('--fill', `${clamp(fill, 0, 100)}%`);
  heatDoseSlider.style.setProperty('--fill', `${clamp(doseFill, 0, 100)}%`);
  pressureSlider.style.setProperty('--fill', `${clamp(pressureFill, 0, 100)}%`);
  heatLabel.textContent = `Base: ${c}°C / ${f}°F / ${k}K • Effective: ${ambientC}°C / ${ambientF}°F / ${ambientK}K`;
  pressureSlider.value = String(world.pressureAtm);
  pressureLabel.textContent = `Pressure: ${effectivePressureAtm.toFixed(2)} atm • Base ${world.pressureAtm.toFixed(2)} atm • Gas ${getGasMoleculeCount()}`;
  tempInput.value = String(Math.round(toSelectedUnitTemp(world.temperatureC)));
  tempUnitSelect.value = world.ui.tempInputUnit;
  heatDoseLabel.textContent = 'Shot strength';
  heatDoseValue.textContent = `${Math.abs(Math.round(world.heatDoseC))}°C`;
  const stirringText = world.stirring.timeLeft > 0 ? ` • Stirring ${world.stirring.timeLeft.toFixed(1)}s` : '';
  const waterText = waterChem ? ` • pH ${waterChem.pH.toFixed(1)}` : '';
  simLabel.textContent = `Base ${c}°C • Offset ${formatThermalDelta(pulse) || '0°C'} • Effective ${ambientC}°C • ${effectivePressureAtm.toFixed(2)} atm${waterText} • ${world.timeScale}x speed${stirringText}`;
  timeScaleBtn.textContent = `Time ${world.timeScale}x`;
  stirBtn.classList.toggle('active', world.stirring.timeLeft > 0);
  stirBtn.textContent = world.stirring.timeLeft > 0 ? 'Stirring' : 'Stir';
  statusText.innerHTML = `${world.running ? 'Running' : 'Paused'}<br>${world.molecules.length} molecules<br>${ambientC}°C effective • ${effectivePressureAtm.toFixed(2)} atm${waterChem ? ` • pH ${waterChem.pH.toFixed(1)}` : ''}<br>${world.stats.reactions} reactions • heat +${Math.round(world.thermalStats.addedC)} / -${Math.round(world.thermalStats.removedC)}`;
}

function cycleTimeScale() {
  const idx = SPEED_PRESET.indexOf(world.timeScale);
  world.timeScale = SPEED_PRESET[(idx + 1) % SPEED_PRESET.length];
  updateThermalLabels();
}

function startStirring(duration = 5.5, power = 1) {
  world.stirring.timeLeft = Math.max(world.stirring.timeLeft, duration);
  world.stirring.power = Math.max(world.stirring.power, power);
  addReactionLog('tool', 'Stirrer engaged');
  updateThermalLabels();
}

function applyStirring(dt) {
  if (world.stirring.timeLeft <= 0 || !world.bounds) {
    world.stirring.timeLeft = 0;
    world.stirring.power = 0;
    return;
  }

  world.stirring.timeLeft = Math.max(0, world.stirring.timeLeft - dt);
  const b = world.bounds;
  const cx = b.x + b.w * 0.5;
  const cy = b.y + b.h * 0.58;
  const swirl = (0.065 + world.stirring.power * 0.030) * dt * 60;
  const inward = 0.0085 * dt * 60;
  const verticalWave = Math.sin(world.time * 3.1) * 0.045 * dt * 60;

  for (const mol of world.molecules) {
    if (!mol.alive) continue;
    const center = moleculeCenter(mol);
    const dx = center.x - cx;
    const dy = center.y - cy;
    const radius = Math.max(24, Math.hypot(dx, dy));
    const tangentialX = -dy / radius;
    const tangentialY = dx / radius;
    const radialX = -dx / radius;
    const radialY = -dy / radius;
    const edgeBoost = clamp(radius / Math.max(1, b.w * 0.45), 0.35, 1.15);
    const phaseBoost = mol.phase === 'liquid' ? 1.2 : (mol.phase === 'particle' ? 0.95 : 0.75);

    for (const atom of mol.atoms) {
      atom.vx += tangentialX * swirl * edgeBoost * phaseBoost;
      atom.vy += tangentialY * swirl * edgeBoost * phaseBoost;
      atom.vx += radialX * inward;
      atom.vy += radialY * inward + verticalWave;
    }
  }

  if (world.stirring.timeLeft <= 0.001) {
    world.stirring.timeLeft = 0;
    world.stirring.power = 0;
  }
}

function cacheCurrentTabScroll() {
  const scroller = tabContent.querySelector('.scroll');
  if (!scroller) return;
  const key = world.ui.lastRenderedTab || world.ui.activeTab;
  world.ui.scrollTopByTab[key] = scroller.scrollTop;
}

function updatePhysics(dt) {
  const b = world.bounds;
  const ambientTempC = getEffectiveTemperatureC();
  const pressureAtm = getEffectivePressureAtm();
  const ambientHeat = tempToHeatLevel(ambientTempC);
  const thermalScale = Math.sqrt(cToK(ambientTempC) / 298.15);
  const liquidLayout = getLiquidLayerLayout();
  world.heatPulseC *= Math.pow(world.heatPulseC >= 0 ? 0.48 : 0.54, dt);
  if (Math.abs(world.heatPulseC) < 0.08) world.heatPulseC = 0;

  for (const event of world.thermalEvents) {
    event.age += dt;
  }
  world.thermalEvents = world.thermalEvents.filter(event => event.age < event.ttl);

  for (const mol of world.molecules) {
    for (const a of mol.atoms) {
      a.fx = 0;
      a.fy = 0;
    }
  }

  applyStirring(dt);
  applyMoleculeRepulsion(dt);

  for (const mol of world.molecules) {
    for (const bond of mol.bonds) {
      const a = mol.atoms[bond.a];
      const c = mol.atoms[bond.b];
      const k = 0.26 + 0.10 * bond.order;
      springBond(a, c, bond.rest, k, 0.28, 1);
    }

    for (const shape of (mol.shapeConstraints || [])) {
      const a = mol.atoms[shape.a];
      const c = mol.atoms[shape.b];
      const wobbleRest = shape.rest * (1 + Math.sin(world.time * 1.9 + shape.phase) * shape.wobble);
      springBond(a, c, wobbleRest, shape.strength, shape.damping, 1);
      softRepulsion(a, c, shape.minDist, 0.07);
    }

    for (const ang of mol.angleConstraints) {
      applyAngleConstraint(mol, ang, 0.032, dt);
    }
  }

  for (const mol of world.molecules) {
    const center = moleculeCenter(mol);

    if (mol.phase === 'gas') {
      const pressureOffset = pressureAtm - 1;
      const gasTargetX = b.x + b.w * 0.5;
      const gasTargetY = b.y + b.h * 0.28;
      for (const a of mol.atoms) {
        const jitter = (5 + ambientHeat * 9) * thermalScale * clamp(0.82 + pressureAtm * 0.18, 0.55, 2.2);
        a.fx += Math.sin(world.time * 1.8 + a.phase) * jitter * 0.18;
        a.fy += Math.cos(world.time * 2.1 + a.phase * 1.3) * jitter * 0.18;
        a.fx += (gasTargetX - a.x) * pressureOffset * 0.0018;
        a.fy += (gasTargetY - a.y) * pressureOffset * 0.0014;
      }
    }

    if (mol.phase === 'particle') {
      const settle = clamp((mol.density || 1) * 0.42, 0.18, 1.2);
      for (const a of mol.atoms) {
        a.fy += settle;
        a.vx *= 0.985;
        a.vy *= 0.992;
      }
    }

    if (mol.phase === 'liquid') {
      const yNorm = clamp((center.y - b.y) / b.h, 0, 1);
      const targetYNorm = clamp(0.18 + (mol.density / 1.45) * 0.68, 0.16, 0.93);
      const densityBias = (targetYNorm - yNorm) * 12;

      const mixFactor = (mol.miscibleGroup === 'water') ? 0.55 :
                        (mol.miscibleGroup === 'organic-heavy') ? 0.85 : 0.42;

      for (const a of mol.atoms) {
        a.fy += densityBias * mixFactor;
        const drag = 0.989 - ambientHeat * 0.012;
        a.vx *= drag;
        a.vy *= drag;
      }

      const cx = b.x + b.w * 0.5;
      for (const a of mol.atoms) {
        a.fx += (cx - a.x) * 0.004;
      }
    }

    const boundaryPullX = (b.x + b.w * 0.5 - center.x) * 0.0008;
    for (const a of mol.atoms) {
      a.fx += boundaryPullX;
    }

    const baseDamp = mol.phase === 'gas' || mol.phase === 'particle'
      ? (0.996 - ambientHeat * 0.005 - Math.max(0, pressureAtm - 1) * 0.0016)
      : (0.993 - ambientHeat * 0.0025);

    for (const a of mol.atoms) {
      a.vx *= baseDamp;
      a.vy *= baseDamp;

      a.vx += (a.fx / a.m) * dt * 60;
      a.vy += (a.fy / a.m) * dt * 60;

      const vmax = (mol.phase === 'gas' || mol.phase === 'particle')
        ? (1.9 + ambientHeat * 3.8) * thermalScale * clamp(1.1 - Math.max(0, pressureAtm - 1) * 0.08, 0.65, 1.18)
        : (1.1 + ambientHeat * 1.0) * Math.min(thermalScale, 1.7);

      const v = Math.hypot(a.vx, a.vy);
      if (v > vmax) {
        const s = vmax / v;
        a.vx *= s;
        a.vy *= s;
      }

      a.x += a.vx * dt * 60;
      a.y += a.vy * dt * 60;
    }

    keepMoleculeInsideVessel(mol, b);
    confineMoleculeToPhaseZone(mol, b, liquidLayout, dt);
  }

  handleDissolution(dt);
  handleCarbonation(dt, ambientTempC, pressureAtm);
  handleAqueousIonChemistry(dt, ambientTempC, pressureAtm);
  handleLiquidMixing(dt);
  handlePhaseTransitions(dt, ambientTempC, pressureAtm);
  runScriptedReactions(dt, ambientTempC, pressureAtm);
  world.molecules = world.molecules.filter(m => m.alive);

  if (world.selectedMolId && !world.molecules.some(m => m.id === world.selectedMolId)) {
    world.selectedMolId = null;
    markSidebarDirty();
  }
}

function moleculeMass(mol) {
  return mol.atoms.reduce((sum, atom) => sum + (elementStyles[atom.el]?.m || 0), 0);
}

function averageBondLength(mol) {
  if (!mol.bonds.length) return null;
  let total = 0;
  for (const bond of mol.bonds) {
    total += dist(mol.atoms[bond.a], mol.atoms[bond.b]);
  }
  return total / mol.bonds.length;
}

function averageBondStrain(mol) {
  if (!mol.bonds.length) return null;
  let total = 0;
  for (const bond of mol.bonds) {
    total += Math.abs(dist(mol.atoms[bond.a], mol.atoms[bond.b]) - bond.rest);
  }
  return total / mol.bonds.length;
}

function drawGrid(w, h) {
  ctx.save();
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--grid').trim();
  ctx.lineWidth = 1;

  for (let x = 0; x < w; x += 60) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
  for (let y = 0; y < h; y += 60) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawVessel() {
  const b = world.bounds;
  ctx.save();

  ctx.fillStyle = 'rgba(255,255,255,.02)';
  ctx.strokeStyle = 'rgba(220,230,245,.14)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(b.x, b.y, b.w, b.h, 16);
  ctx.fill();
  ctx.stroke();

  if (world.molecules.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,.04)';
    ctx.font = '14px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Add atoms or molecules from the Library', b.x + b.w / 2, b.y + b.h / 2 - 12);
    ctx.font = '12px Inter, sans-serif';
    ctx.fillStyle = 'rgba(152,166,184,.8)';
    ctx.fillText('The sandbox starts empty.', b.x + b.w / 2, b.y + b.h / 2 + 12);
  }

  const liquidLayout = getLiquidLayerLayout();
  if (liquidLayout.layers.length > 0) {
    for (const layer of liquidLayout.layers) {
      ctx.fillStyle = colorWithAlpha(layer.color, 0.10 + layer.count * 0.02);
      ctx.beginPath();
      ctx.roundRect(b.x + 3, layer.y, b.w - 6, layer.h, 12);
      ctx.fill();

      const labelType = layer.layerKey === 'water' ? 'H2O' : layer.layerKey;
      const label = layer.layerKey === 'water' && layer.dissolvedTypes.includes('CO2')
        ? 'Carbonated water'
        : getSpeciesDisplayName(labelType);
      const dissolvedLabel = layer.dissolvedTypes.length
        ? ` + ${layer.dissolvedTypes.slice(0, 3).map(getSpeciesDisplayLabel).join(', ')}${layer.dissolvedTypes.length > 3 ? '...' : ''}`
        : '';
      const chemistryLabel = layer.chemistry
        ? ` • pH ${layer.chemistry.pH.toFixed(1)}${layer.chemistry.majorIons.length ? ` • ${layer.chemistry.majorIons.slice(0, 2).map(entry => formatIonLabel(entry.ion)).join(', ')}` : ''}`
        : '';
      if (layer.h >= 18) {
        ctx.fillStyle = 'rgba(231,237,245,.68)';
        ctx.font = '11px Inter, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${label}${dissolvedLabel}${chemistryLabel}`, b.x + 10, layer.centerY);
      }
    }

    ctx.strokeStyle = 'rgba(255,255,255,.10)';
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(b.x + 8, liquidLayout.surfaceY);
    ctx.lineTo(b.x + b.w - 8, liquidLayout.surfaceY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.fillStyle = 'rgba(255,255,255,.04)';
  ctx.font = '12px Inter, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('vessel', b.x + 12, b.y + 10);

  ctx.restore();
}

function drawBond(a, b, order) {
  const ang = Math.atan2(b.y - a.y, b.x - a.x);
  const nx = Math.sin(ang);
  const ny = -Math.cos(ang);

  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--bond').trim();
  ctx.lineCap = 'round';
  ctx.lineWidth = 2 + order * 0.8;

  if (order === 2) {
    for (const sign of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(a.x + nx * 3 * sign, a.y + ny * 3 * sign);
      ctx.lineTo(b.x + nx * 3 * sign, b.y + ny * 3 * sign);
      ctx.stroke();
    }
  } else {
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  const count = order === 2 ? 4 : 2;
  const midX = (a.x + b.x) * 0.5;
  const midY = (a.y + b.y) * 0.5;

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--e').trim();
  ctx.globalAlpha = 0.68;
  for (let i = 0; i < count; i++) {
    const lane = (i - (count - 1) / 2) * 4;
    ctx.beginPath();
    ctx.arc(midX + nx * lane, midY + ny * lane, 1.85, 0, TAU);
    ctx.fill();
  }

  ctx.restore();
}

function drawAtom(atom, loneDots, t, selected = false) {
  const style = elementStyles[atom.el];
  const shellR = style.r + 9;

  ctx.save();

  if (loneDots > 0) {
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--e').trim();
    ctx.globalAlpha = 0.58;

    for (let i = 0; i < loneDots; i++) {
      const ang = t * 0.0011 + atom.phase + (i / loneDots) * TAU;
      const ex = atom.x + Math.cos(ang) * shellR;
      const ey = atom.y + Math.sin(ang) * shellR;
      ctx.beginPath();
      ctx.arc(ex, ey, 1.45, 0, TAU);
      ctx.fill();
    }
  }

  ctx.shadowColor = colorWithAlpha(style.color, selected ? 0.55 : 0.35);
  ctx.shadowBlur = selected ? 16 : 10;

  ctx.fillStyle = style.color;
  ctx.beginPath();
  ctx.arc(atom.x, atom.y, style.r, 0, TAU);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = selected ? 'rgba(255,255,255,.42)' : 'rgba(255,255,255,.12)';
  ctx.lineWidth = selected ? 2 : 1;
  ctx.stroke();

  ctx.fillStyle = 'rgba(10,14,20,.9)';
  ctx.font = `700 ${Math.max(11, style.r * 0.75)}px Inter, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(atom.el, atom.x, atom.y + 0.5);

  ctx.restore();
}

function drawMolecule(mol, t) {
  for (const bond of mol.bonds) {
    const a = mol.atoms[bond.a];
    const b = mol.atoms[bond.b];
    drawBond(a, b, bond.order);
  }

  const selected = world.selectedMolId === mol.id;
  for (let i = 0; i < mol.atoms.length; i++) {
    drawAtom(mol.atoms[i], getLoneElectronCount(mol, i), t, selected);
  }
}

function drawHeatOverlay() {
  const effectiveTempC = getEffectiveTemperatureC();
  const amount = tempToHeatLevel(effectiveTempC);
  const cooling = clamp((-world.heatPulseC) / 700, 0, 1);
  if (amount < 0.02 && cooling < 0.02) return;

  ctx.save();
  const g = ctx.createLinearGradient(0, window.innerHeight, 0, 0);
  g.addColorStop(0, `rgba(255,138,82,${0.02 + amount * 0.10})`);
  g.addColorStop(0.45, `rgba(255,208,142,${0.01 + amount * 0.05})`);
  g.addColorStop(1, `rgba(120,188,255,${cooling * 0.07})`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  if (amount > 0.10) {
    ctx.globalAlpha = 0.05 + amount * 0.08;
    ctx.strokeStyle = 'rgba(255,207,150,.45)';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 7; i++) {
      const x = ((world.time * 70) + i * 160) % (window.innerWidth + 180) - 90;
      const y = window.innerHeight - 90 - i * 18;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x - 14, y - 24, x + 14, y - 44, x, y - 68);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawThermalEvents() {
  if (!world.thermalEvents.length) return;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (const event of world.thermalEvents) {
    const life = 1 - event.age / event.ttl;
    const radius = 18 + (1 - life) * 26;
    const y = event.y - (1 - life) * 24;
    const hot = event.deltaC >= 0;
    const color = hot ? `rgba(255,179,120,${0.12 + life * 0.20})` : `rgba(144,205,255,${0.12 + life * 0.18})`;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(event.x, y, radius, 0, TAU);
    ctx.fill();

    ctx.strokeStyle = hot ? `rgba(255,214,170,${life * 0.50})` : `rgba(190,226,255,${life * 0.46})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(event.x, y, radius + 5, 0, TAU);
    ctx.stroke();

    ctx.fillStyle = hot ? `rgba(255,233,210,${life})` : `rgba(216,241,255,${life})`;
    ctx.font = '11px Inter, sans-serif';
    ctx.fillText(event.label || formatThermalDelta(event.deltaC), event.x, y - radius - 10);
  }

  ctx.restore();
}

function drawScene() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const now = performance.now();

  ctx.clearRect(0, 0, w, h);
  drawGrid(w, h);
  drawVessel();

  for (const mol of world.molecules) {
    drawMolecule(mol, now);
  }

  drawHeatOverlay();
  drawThermalEvents();
}

function pointerPos(e) {
  return { x: e.clientX, y: e.clientY };
}

function findTopMoleculeAt(x, y) {
  for (let i = world.molecules.length - 1; i >= 0; i--) {
    const mol = world.molecules[i];
    for (const atom of mol.atoms) {
      if (Math.hypot(atom.x - x, atom.y - y) <= atom.r + 6) {
        return { mol, atom };
      }
    }
  }
  return null;
}

function moveMoleculeCenterTo(mol, x, y) {
  const c = moleculeCenter(mol);
  const dx = x - c.x;
  const dy = y - c.y;
  for (const a of mol.atoms) {
    a.x += dx;
    a.y += dy;
    a.vx *= 0.7;
    a.vy *= 0.7;
  }
}

function getSelectedMolecule() {
  return world.molecules.find(m => m.id === world.selectedMolId) || null;
}

function getLibraryColor(key) {
  if (key.startsWith('atom-')) {
    const el = key.replace('atom-', '');
    return elementStyles[el].color;
  }
  return SPECIES[key]?.color || '#9bbcff';
}

function addLibraryItem(key) {
  if (key.startsWith('atom-')) {
    addAtom(key.replace('atom-', ''));
  } else {
    const made = addMolecule(key);
    if (!made && key === 'Cl2') {
      addAtom('Cl');
      addAtom('Cl');
    } else if (!made && key === 'NaCl') {
      addAtom('Na');
      addAtom('Cl');
    }
  }
}

function removeSelectedMolecule() {
  const mol = getSelectedMolecule();
  if (!mol) return;
  world.molecules = world.molecules.filter(m => m.id !== mol.id);
  world.selectedMolId = null;
  markSidebarDirty();
}

function duplicateSelectedMolecule() {
  const mol = getSelectedMolecule();
  if (!mol) return;
  const center = moleculeCenter(mol);
  if (mol.type.startsWith('atom-')) {
    addAtom(mol.type.replace('atom-', ''), center.x + 26, center.y + 22);
  } else {
    addMolecule(mol.type, center.x + 26, center.y + 22);
  }
}

function syncTabButtons() {
  document.querySelectorAll('.tabBtn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === world.ui.activeTab);
  });
}

function renderLibraryTab() {
  const wrap = document.createElement('div');
  wrap.className = 'content';

  const chips = document.createElement('div');
  chips.className = 'chips';

  const filters = [
    { key: 'all', label: 'All' },
    { key: 'atoms', label: 'Atoms' },
    { key: 'molecules', label: 'Molecules' },
    { key: 'liquids', label: 'Liquids' },
    { key: 'gases', label: 'Gases' }
  ];

  for (const f of filters) {
    const btn = document.createElement('button');
    btn.className = 'chipBtn' + (world.ui.libraryFilter === f.key ? ' active' : '');
    btn.textContent = f.label;
    btn.addEventListener('click', () => {
      world.ui.libraryFilter = f.key;
      markSidebarDirty();
      renderSidebar();
    });
    chips.appendChild(btn);
  }

  const list = document.createElement('div');
  list.className = 'scroll';

  const search = world.ui.search.trim().toLowerCase();

  let items = LIBRARY_ITEMS.filter(item => {
    if (world.ui.libraryFilter === 'atoms' && item.category !== 'atoms') return false;
    if (world.ui.libraryFilter === 'molecules' && item.category !== 'molecules') return false;
    if (world.ui.libraryFilter === 'liquids' && item.phase !== 'liquid') return false;
    if (world.ui.libraryFilter === 'gases' && item.phase !== 'gas') return false;
    if (search && !(item.name.toLowerCase().includes(search) || item.formula.toLowerCase().includes(search) || item.search.includes(search))) return false;
    return true;
  });

  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'emptyState';
    empty.innerHTML = `<div><strong>No matches</strong><div class="small" style="margin-top:6px;">Try a different search or filter.</div></div>`;
    list.appendChild(empty);
  } else {
    for (const item of items) {
      const card = document.createElement('div');
      card.className = 'card';

      const color = getLibraryColor(item.key);
      const behavior = speciesBehaviorSummary(item.key);
      card.innerHTML = `
        <div class="cardTop">
          <div class="cardTitle">
            <strong><span class="colorDot" style="background:${color}"></span>${item.name}</strong>
            <span>${item.formula}</span>
          </div>
          <div class="phaseTag">${item.phase}</div>
        </div>
        <div class="small">${item.description}</div>
        <div class="small" style="margin-top:8px;">${behavior}</div>
      `;

      const actions = document.createElement('div');
      actions.className = 'cardActions';

      const addBtn = document.createElement('button');
      addBtn.className = 'miniBtn primary';
      addBtn.textContent = 'Add';
      addBtn.addEventListener('click', () => addLibraryItem(item.key));

      const add3Btn = document.createElement('button');
      add3Btn.className = 'miniBtn';
      add3Btn.textContent = 'Add 3';
      add3Btn.addEventListener('click', () => {
        for (let i = 0; i < 3; i++) addLibraryItem(item.key);
      });

      actions.appendChild(addBtn);
      actions.appendChild(add3Btn);
      card.appendChild(actions);

      card.addEventListener('dblclick', () => addLibraryItem(item.key));
      list.appendChild(card);
    }
  }

  wrap.appendChild(chips);
  wrap.appendChild(list);
  return wrap;
}

function renderSceneTab() {
  const wrap = document.createElement('div');
  wrap.className = 'content';

  const list = document.createElement('div');
  list.className = 'scroll';
  const waterChem = getWaterChemistrySnapshot();

  if (waterChem) {
    const chemCard = document.createElement('div');
    chemCard.className = 'card';
    chemCard.innerHTML = `
      <div class="cardTop">
        <div class="cardTitle">
          <strong>Aqueous Chemistry</strong>
          <span>${waterChem.aqueousCount} water-phase molecule${waterChem.aqueousCount === 1 ? '' : 's'}</span>
        </div>
        <div class="phaseTag">water</div>
      </div>
      <div class="inspectGrid">
        <div class="kv"><span>pH</span><strong>${waterChem.pH.toFixed(1)}</strong></div>
        <div class="kv"><span>Major ions</span><strong>${waterChem.majorIons.length ? waterChem.majorIons.map(entry => formatIonLabel(entry.ion)).join(', ') : 'none'}</strong></div>
        <div class="kv"><span>Conductivity</span><strong>${waterChem.conductivity.toFixed(1)}</strong></div>
        <div class="kv"><span>Carbonation</span><strong>${waterChem.isCarbonated ? 'present' : 'none'}</strong></div>
      </div>
    `;
    list.appendChild(chemCard);
  }

  if (world.molecules.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'emptyState';
    empty.innerHTML = `<div><strong>Sandbox is empty</strong><div class="small" style="margin-top:6px;">Add atoms or molecules from Library.</div></div>`;
    list.appendChild(empty);
    wrap.appendChild(list);
    return wrap;
  }

  const grouped = {};
  for (const mol of world.molecules) {
    const key = mol.type;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(mol);
  }

  const search = world.ui.search.trim().toLowerCase();
  const entries = Object.entries(grouped).filter(([key, arr]) => {
    const mol = arr[0];
    const blob = `${mol.display} ${mol.formula} ${mol.phase} ${key}`.toLowerCase();
    return !search || blob.includes(search);
  });

  if (entries.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'emptyState';
    empty.innerHTML = `<div><strong>No scene matches</strong><div class="small" style="margin-top:6px;">Your search did not match anything in the sandbox.</div></div>`;
    list.appendChild(empty);
  } else {
    entries.sort((a, b) => a[1][0].display.localeCompare(b[1][0].display));

    for (const [key, arr] of entries) {
      const mol = arr[0];
      const card = document.createElement('div');
      card.className = 'card';

      const color = mol.color || getLibraryColor(key);
      card.innerHTML = `
        <div class="cardTop">
          <div class="cardTitle">
            <strong><span class="colorDot" style="background:${color}"></span>${mol.display}</strong>
            <span>${arr.length} molecule${arr.length === 1 ? '' : 's'} • ${mol.formula}</span>
          </div>
          <div class="phaseTag">${mol.phase}</div>
        </div>
      `;

      const actions = document.createElement('div');
      actions.className = 'cardActions';

      const selectBtn = document.createElement('button');
      selectBtn.className = 'miniBtn';
      selectBtn.textContent = 'Select one';
      selectBtn.addEventListener('click', () => {
        world.selectedMolId = arr[0].id;
        world.ui.activeTab = 'inspect';
        markSidebarDirty();
        syncTabButtons();
        renderSidebar();
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'miniBtn primary';
      addBtn.textContent = 'Add one';
      addBtn.addEventListener('click', () => {
        if (key.startsWith('atom-')) addAtom(key.replace('atom-', ''));
        else addMolecule(key);
      });

      const removeBtn = document.createElement('button');
      removeBtn.className = 'miniBtn';
      removeBtn.textContent = 'Remove all';
      removeBtn.addEventListener('click', () => {
        world.molecules = world.molecules.filter(m => m.type !== key);
        if (world.selectedMolId && !world.molecules.some(m => m.id === world.selectedMolId)) {
          world.selectedMolId = null;
        }
        markSidebarDirty();
        renderSidebar();
      });

      actions.appendChild(selectBtn);
      actions.appendChild(addBtn);
      actions.appendChild(removeBtn);
      card.appendChild(actions);
      list.appendChild(card);
    }
  }

  wrap.appendChild(list);
  return wrap;
}

function renderInspectTab() {
  const wrap = document.createElement('div');
  wrap.className = 'content';

  const selected = getSelectedMolecule();

  if (!selected) {
    const empty = document.createElement('div');
    empty.className = 'emptyState';
    empty.innerHTML = `<div><strong>Nothing selected</strong><div class="small" style="margin-top:6px;">Click a molecule in the sandbox or select one from Scene.</div></div>`;
    wrap.appendChild(empty);
    return wrap;
  }

  const card = document.createElement('div');
  card.className = 'card';

  const c = moleculeCenter(selected);
  const mass = moleculeMass(selected);
  const avgBond = averageBondLength(selected);
  const bondStrain = averageBondStrain(selected);
  const profile = getSpeciesProfile(selected.type);

  card.innerHTML = `
    <div class="cardTop">
      <div class="cardTitle">
        <strong><span class="colorDot" style="background:${selected.color}"></span>${selected.display}</strong>
        <span>${selected.formula}</span>
      </div>
      <div class="phaseTag">${selected.phase}</div>
    </div>
  `;

  const grid = document.createElement('div');
  grid.className = 'inspectGrid';
  grid.innerHTML = `
    <div class="kv"><span>Type</span><strong>${selected.type}</strong></div>
    <div class="kv"><span>Atoms</span><strong>${selected.atoms.length}</strong></div>
    <div class="kv"><span>Bonds</span><strong>${selected.bonds.length}</strong></div>
    <div class="kv"><span>Mass</span><strong>${mass.toFixed(1)} u</strong></div>
    <div class="kv"><span>Density</span><strong>${selected.density ?? '—'}</strong></div>
    <div class="kv"><span>Reactivity rules</span><strong>${profile.ruleCount}</strong></div>
    <div class="kv"><span>Avg bond</span><strong>${avgBond == null ? '—' : avgBond.toFixed(1)}</strong></div>
    <div class="kv"><span>Bond strain</span><strong>${bondStrain == null ? '—' : bondStrain.toFixed(1)}</strong></div>
    <div class="kv"><span>Center</span><strong>${Math.round(c.x)}, ${Math.round(c.y)}</strong></div>
  `;

  const hint = document.createElement('div');
  const evap = EVAPORATION_CONFIG[selected.type];
  const ionProfile = AQUEOUS_ION_PROFILES[selected.type];
  const weakAcid = WEAK_AQUEOUS_ACIDS[selected.type];
  hint.className = 'hintBox';
  hint.innerHTML = `
    <strong style="color:var(--text)">${getSpeciesDisplayName(selected.type)}</strong><br>
    ${profile.hint
      ? profile.hint
      : selected.phase === 'liquid'
      ? `This liquid participates in the simplified density and layering model.`
      : `This particle is mostly visual unless a scripted reaction rule references it.`}
    <div style="margin-top:10px;">
      <strong style="color:var(--text)">Can react with:</strong> ${formatSpeciesList(profile.reactWith)}<br>
      <strong style="color:var(--text)">Can turn into:</strong> ${formatSpeciesList(profile.turnsInto)}<br>
      <strong style="color:var(--text)">Can be made from:</strong> ${formatSpeciesList(profile.formedFrom)}
    </div>
    ${evap ? `<div style="margin-top:10px;"><strong style="color:var(--text)">Thermal behavior:</strong> boils near ${evap.boilC}°C, condenses near ${evap.condenseC}°C.</div>` : ''}
    ${ionProfile ? `<div style="margin-top:10px;"><strong style="color:var(--text)">In water:</strong> dissociates into ${Object.keys(ionProfile.ions).map(formatIonLabel).join(' and ')}.</div>` : ''}
    ${!ionProfile && weakAcid && selected.phase === 'liquid' ? `<div style="margin-top:10px;"><strong style="color:var(--text)">In water:</strong> behaves as a weak acid.</div>` : ''}
  `;

  const outgoing = renderRuleList(
    'What It Can Do',
    profile.reactantRules,
    'No scripted reaction currently uses this species as a reactant.'
  );

  const incoming = renderRuleList(
    'What Makes It',
    profile.productRules,
    'No scripted reaction currently produces this species.'
  );

  const actions = document.createElement('div');
  actions.className = 'cardActions';

  const dupBtn = document.createElement('button');
  dupBtn.className = 'miniBtn primary';
  dupBtn.textContent = 'Duplicate';
  dupBtn.addEventListener('click', duplicateSelectedMolecule);

  const delBtn = document.createElement('button');
  delBtn.className = 'miniBtn';
  delBtn.textContent = 'Remove';
  delBtn.addEventListener('click', removeSelectedMolecule);

  actions.appendChild(dupBtn);
  actions.appendChild(delBtn);

  card.appendChild(grid);
  card.appendChild(hint);
  card.appendChild(actions);

  wrap.appendChild(card);
  wrap.appendChild(outgoing);
  wrap.appendChild(incoming);
  return wrap;
}

function renderReactionsTab() {
  const wrap = document.createElement('div');
  wrap.className = 'content';

  const head = document.createElement('div');
  head.className = 'logHead';
  head.innerHTML = `<h2>Reaction Log</h2>`;

  const actions = document.createElement('div');
  actions.className = 'logActions';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'miniBtn';
  copyBtn.textContent = 'Copy log';
  copyBtn.addEventListener('click', copyReactionLog);

  const exportBtn = document.createElement('button');
  exportBtn.className = 'miniBtn primary';
  exportBtn.textContent = 'Export .txt';
  exportBtn.addEventListener('click', exportReactionLog);

  const clearLogBtn = document.createElement('button');
  clearLogBtn.className = 'miniBtn';
  clearLogBtn.textContent = 'Clear log';
  clearLogBtn.addEventListener('click', () => {
    world.reactionLog = [];
    world.reactionLogMutedUntil = world.time + 0.6;
    markSidebarDirty();
    renderSidebar();
  });

  actions.appendChild(copyBtn);
  actions.appendChild(exportBtn);
  actions.appendChild(clearLogBtn);
  head.appendChild(actions);

  const known = document.createElement('div');
  known.className = 'card';
  const rules = world.reactionData.reactions || [];
  const search = world.ui.search.trim().toLowerCase();
  const visibleRules = rules.filter(rule => {
    const blob = `${rule.name} ${reactionEquation(rule)} ${rule.note || ''} ${rule.category || ''}`.toLowerCase();
    return !search || blob.includes(search);
  });
  known.innerHTML = `
    <div class="cardTop">
      <div class="cardTitle">
        <strong>Known Reactions</strong>
        <span>${rules.length} scripted rule${rules.length === 1 ? '' : 's'} loaded from JSON</span>
      </div>
      <div class="phaseTag">data</div>
    </div>
  `;
  const knownList = document.createElement('div');
  knownList.style.display = 'grid';
  knownList.style.gap = '8px';
  for (const rule of visibleRules) {
    const row = document.createElement('div');
    row.className = 'hintBox';
    row.innerHTML = `
      <strong style="color:var(--text)">${rule.name}</strong><br>
      <div style="margin:8px 0;display:flex;gap:8px;flex-wrap:wrap;">
        ${thermalBadgeMarkup(rule.thermalDeltaC) || `<span class="thermalBadge">No net thermal impulse</span>`}
        ${thermalWindowMarkup(rule)}
        ${pressureWindowMarkup(rule)}
      </div>
      ${reactionEquation(rule)}<br>
      <span style="color:var(--muted)">${rule.note || 'Scripted pathway.'}</span>
    `;
    knownList.appendChild(row);
  }
  if (visibleRules.length === 0) {
    const emptyRules = document.createElement('div');
    emptyRules.className = 'small';
    emptyRules.textContent = 'No known reaction matches for the current search.';
    knownList.appendChild(emptyRules);
  }
  known.appendChild(knownList);

  const list = document.createElement('div');
  list.className = 'scroll';

  const rows = world.reactionLog
    .slice()
    .reverse()
    .filter(entry => !search || `${entry.type} ${entry.message}`.toLowerCase().includes(search));

  if (rows.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'emptyState';
    empty.innerHTML = '<div><strong>No reactions logged</strong><div class="small" style="margin-top:6px;">Run the simulation to capture bond events and pathway reactions.</div></div>';
    list.appendChild(empty);
  } else {
    for (const entry of rows) {
      const row = document.createElement('div');
      row.className = 'logEntry';
      const thermalMeta = thermalBadgeMarkup(entry.thermalDeltaC);
      row.innerHTML = `
        <div class="logMeta">${formatSimTime(entry.t)} • ${Math.round(entry.tempC)}°C • ${entry.type}</div>
        ${thermalMeta ? `<div style="margin:6px 0 8px 0;display:flex;gap:8px;flex-wrap:wrap;">${thermalMeta}</div>` : ''}
        <div class="logMsg">${formatReactionLogMessage(entry)}</div>
      `;
      list.appendChild(row);
    }
  }

  wrap.appendChild(head);
  wrap.appendChild(known);
  wrap.appendChild(list);
  return wrap;
}

function renderSidebar() {
  sidebarDirty = false;
  cacheCurrentTabScroll();
  tabContent.innerHTML = '';

  let content;
  if (world.ui.activeTab === 'library') content = renderLibraryTab();
  else if (world.ui.activeTab === 'scene') content = renderSceneTab();
  else if (world.ui.activeTab === 'inspect') content = renderInspectTab();
  else content = renderReactionsTab();

  tabContent.appendChild(content);
  const scroller = tabContent.querySelector('.scroll');
  if (scroller) {
    const tabKey = world.ui.activeTab;
    scroller.scrollTop = world.ui.scrollTopByTab[tabKey] || 0;
    scroller.addEventListener('scroll', () => {
      world.ui.scrollTopByTab[tabKey] = scroller.scrollTop;
    }, { passive: true });
  }
  world.ui.lastRenderedTab = world.ui.activeTab;
  sidebarFooterText.textContent = `${world.molecules.length} molecule${world.molecules.length === 1 ? '' : 's'} in sandbox`;
  updateThermalLabels();
}

let lastTime = performance.now();
function frame(now) {
  const dt = clamp((now - lastTime) / 1000, 0, 1 / 24);
  lastTime = now;

  if (world.running) {
    const scaledDt = dt * world.timeScale;
    let remaining = scaledDt;
    const substep = 1 / 120;
    while (remaining > 1e-6) {
      const step = Math.min(substep, remaining);
      world.time += step;
      updatePhysics(step);
      remaining -= step;
    }
    updateThermalLabels();
  }

  drawScene();

  if (sidebarDirty) {
    renderSidebar();
  }

  requestAnimationFrame(frame);
}

canvas.addEventListener('pointerdown', (e) => {
  const p = pointerPos(e);
  const hit = findTopMoleculeAt(p.x, p.y);

  if (!hit) {
    if (world.selectedMolId !== null) {
      world.selectedMolId = null;
      markSidebarDirty();
    }
    return;
  }

  if (world.selectedMolId !== hit.mol.id) {
    world.selectedMolId = hit.mol.id;
    markSidebarDirty();
  }

  const c = moleculeCenter(hit.mol);
  world.dragging.mol = hit.mol;
  world.dragging.offsetX = p.x - c.x;
  world.dragging.offsetY = p.y - c.y;
});

window.addEventListener('pointermove', (e) => {
  if (!world.dragging.mol) return;
  const p = pointerPos(e);
  moveMoleculeCenterTo(
    world.dragging.mol,
    p.x - world.dragging.offsetX,
    p.y - world.dragging.offsetY
  );
});

window.addEventListener('pointerup', () => {
  world.dragging.mol = null;
});

document.querySelectorAll('.tabBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    cacheCurrentTabScroll();
    world.ui.activeTab = btn.dataset.tab;
    syncTabButtons();
    markSidebarDirty();
    renderSidebar();
  });
});

searchInput.addEventListener('input', (e) => {
  world.ui.search = e.target.value;
  markSidebarDirty();
  renderSidebar();
});

playPauseBtn.addEventListener('click', () => {
  world.running = !world.running;
  playPauseBtn.textContent = world.running ? 'Pause' : 'Play';
  markSidebarDirty();
  renderSidebar();
});

clearBtn.addEventListener('click', clearWorld);

timeScaleBtn.addEventListener('click', cycleTimeScale);
stirBtn.addEventListener('click', () => startStirring());

heatPulseBtn.addEventListener('click', () => {
  const cx = world.bounds ? world.bounds.x + world.bounds.w * 0.5 : window.innerWidth * 0.5;
  const cy = world.bounds ? world.bounds.y + world.bounds.h * 0.5 : window.innerHeight * 0.5;
  const dose = Math.abs(world.heatDoseC);
  applyThermalImpulse(dose, 'Heater pulse', { x: cx, y: cy, label: `heater ${formatThermalDelta(dose)}`, source: 'heater' });
  updateThermalLabels();
});

coolPulseBtn.addEventListener('click', () => {
  const cx = world.bounds ? world.bounds.x + world.bounds.w * 0.5 : window.innerWidth * 0.5;
  const cy = world.bounds ? world.bounds.y + world.bounds.h * 0.5 : window.innerHeight * 0.5;
  const dose = -Math.abs(world.heatDoseC);
  applyThermalImpulse(dose, 'Cooling shot', { x: cx, y: cy, label: `cool ${formatThermalDelta(dose)}`, source: 'cooler' });
  updateThermalLabels();
});

heatDoseSlider.addEventListener('input', (e) => {
  world.heatDoseC = clamp(Math.abs(Number(e.target.value) || 0), Number(heatDoseSlider.min), Number(heatDoseSlider.max));
  updateThermalLabels();
});

heatSlider.addEventListener('input', (e) => {
  world.temperatureC = Number(e.target.value);
  updateThermalLabels();
});

pressureSlider.addEventListener('input', (e) => {
  world.pressureAtm = clamp(Number(e.target.value), Number(pressureSlider.min), Number(pressureSlider.max));
  updateThermalLabels();
});

tempUnitSelect.addEventListener('change', (e) => {
  world.ui.tempInputUnit = e.target.value;
  updateThermalLabels();
});

tempInput.addEventListener('change', () => {
  const entered = Number(tempInput.value);
  if (!Number.isFinite(entered)) {
    updateThermalLabels();
    return;
  }
  const min = Number(heatSlider.min);
  const max = Number(heatSlider.max);
  world.temperatureC = clamp(selectedUnitToCelsius(entered), min, max);
  updateThermalLabels();
});

async function initApp() {
  world.reactionData = await loadReactionData();
  resize();
  updateThermalLabels();
  syncTabButtons();
  renderSidebar();
  requestAnimationFrame(frame);
}

initApp();
</script>
</body>
</html>
