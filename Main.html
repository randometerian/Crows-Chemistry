<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Chemistry Sandbox</title>
  <style>
    :root{
      --bg:#0b0f14;
      --bg2:#10161e;
      --panel:rgba(16,22,30,.90);
      --panel2:rgba(255,255,255,.035);
      --border:rgba(255,255,255,.08);
      --text:#e7edf5;
      --muted:#98a6b8;
      --accent:#9bbcff;
      --accentSoft:rgba(155,188,255,.16);
      --danger:#f39a9a;
      --bond:rgba(228,235,245,.78);
      --grid:rgba(255,255,255,.035);
      --h:#8fc5ff;
      --o:#f39a9a;
      --c:#b8b8b8;
      --cl:#8ee07e;
      --na:#ffe08a;
      --e:#f1dc88;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #app{
      position: relative;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.025), transparent 34%),
        linear-gradient(180deg, var(--bg2), var(--bg));
    }

    canvas{
      display:block;
      width:100%;
      height:100%;
    }

    .hud{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .panel{
      pointer-events:auto;
      position:absolute;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.28);
      backdrop-filter: blur(8px);
    }

    .sidebar{
      left:14px;
      top:14px;
      bottom:92px;
      width:min(360px, calc(100vw - 28px));
      padding:14px;
      display:grid;
      grid-template-rows:auto auto auto 1fr auto;
      gap:12px;
    }

    .bottom{
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(980px, calc(100vw - 28px));
      padding:12px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:12px;
      align-items:center;
    }

    h1,h2,h3,p{ margin:0; }
    h1{ font-size:16px; font-weight:700; }
    h2{
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }
    p, .small{
      font-size:12px;
      line-height:1.45;
      color:var(--muted);
    }

    .header{
      display:grid;
      gap:4px;
    }

    .searchWrap{
      position:relative;
    }

    .searchWrap input{
      width:100%;
      height:42px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.045);
      color:var(--text);
      padding:0 14px 0 40px;
      outline:none;
      font-size:13px;
    }

    .searchWrap input::placeholder{
      color:var(--muted);
    }

    .searchWrap input:focus{
      border-color:rgba(155,188,255,.36);
      box-shadow:0 0 0 3px rgba(155,188,255,.08);
    }

    .searchIcon{
      position:absolute;
      left:13px;
      top:50%;
      transform:translateY(-50%);
      color:var(--muted);
      font-size:14px;
      pointer-events:none;
    }

    .tabs{
      display:flex;
      gap:8px;
    }

    .tabBtn, .chipBtn, button{
      appearance:none;
      border:1px solid var(--border);
      background:rgba(255,255,255,.045);
      color:var(--text);
      border-radius:12px;
      min-height:38px;
      padding:0 12px;
      font-size:13px;
      font-weight:650;
      cursor:pointer;
      transition:background .14s ease, border-color .14s ease, transform .14s ease;
    }

    .tabBtn:hover, .chipBtn:hover, button:hover{
      background:rgba(255,255,255,.07);
      border-color:rgba(255,255,255,.14);
    }

    .tabBtn:active, .chipBtn:active, button:active{
      transform:translateY(1px);
    }

    .tabBtn.active, .chipBtn.active, button.active{
      background:var(--accentSoft);
      border-color:rgba(155,188,255,.34);
      color:#eef4ff;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .chipBtn{
      min-height:32px;
      padding:0 10px;
      font-size:12px;
      border-radius:999px;
    }

    .content{
      min-height:0;
      display:grid;
      gap:12px;
      overflow:hidden;
    }

    .scroll{
      min-height:0;
      overflow:auto;
      padding-right:4px;
      display:grid;
      gap:10px;
      align-content:start;
    }

    .card{
      display:grid;
      gap:8px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.035);
    }

    .cardTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .cardTitle{
      display:grid;
      gap:3px;
    }

    .cardTitle strong{
      font-size:13px;
      font-weight:700;
    }

    .cardTitle span{
      font-size:12px;
      color:var(--muted);
    }

    .phaseTag{
      font-size:11px;
      line-height:1;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      padding:6px 8px;
      border-radius:999px;
      white-space:nowrap;
    }

    .cardActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .logHead{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .logActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .logEntry{
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
      padding:10px;
      background:rgba(255,255,255,.025);
      display:grid;
      gap:4px;
    }

    .logMeta{
      font-size:11px;
      color:var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .logMsg{
      font-size:12px;
      color:var(--text);
    }

    .miniBtn{
      min-height:32px;
      padding:0 10px;
      border-radius:10px;
      font-size:12px;
    }

    .miniBtn.primary{
      background:rgba(155,188,255,.12);
      border-color:rgba(155,188,255,.30);
    }

    .colorDot{
      width:11px;
      height:11px;
      border-radius:999px;
      display:inline-block;
      margin-right:8px;
      vertical-align:middle;
      box-shadow:0 0 10px rgba(255,255,255,.08);
    }

    .emptyState{
      height:100%;
      min-height:220px;
      display:grid;
      place-items:center;
      text-align:center;
      padding:18px;
      border:1px dashed rgba(255,255,255,.08);
      border-radius:16px;
      color:var(--muted);
      background:rgba(255,255,255,.02);
    }

    .footerRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      color:var(--muted);
      font-size:12px;
    }

    .toolbar{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .heatActionWrap{
      display:grid;
      gap:8px;
      min-width:220px;
    }

    .heatActionRow{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .heatDoseWrap{
      display:grid;
      gap:6px;
      min-width:180px;
    }

    .heatDoseLabel{
      font-size:11px;
      color:var(--muted);
      display:flex;
      justify-content:space-between;
      gap:8px;
    }

    .rangeWrap{
      display:grid;
      gap:8px;
      width:100%;
    }

    .rangeHead{
      display:flex;
      justify-content:space-between;
      gap:10px;
      color:var(--muted);
      font-size:12px;
    }

    .tempControls{
      display:flex;
      gap:6px;
      align-items:center;
      justify-content:flex-end;
    }

    .tempControls input,
    .tempControls select{
      appearance:none;
      border:1px solid var(--border);
      background:rgba(255,255,255,.045);
      color:var(--text);
      border-radius:10px;
      height:30px;
      font-size:12px;
      padding:0 8px;
      outline:none;
    }

    .tempControls input{
      width:92px;
      text-align:right;
    }

    .tempControls select{
      width:56px;
      text-align:center;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      width:100%;
      height:8px;
      border-radius:999px;
      outline:none;
      background:
        linear-gradient(90deg, var(--accent), var(--accent)) 0/var(--fill,0%) 100% no-repeat,
        rgba(255,255,255,.08);
      cursor:pointer;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:16px;
      height:16px;
      border-radius:999px;
      background:#dce7fa;
      border:1px solid rgba(0,0,0,.22);
    }

    input[type="range"]::-moz-range-thumb{
      width:16px;
      height:16px;
      border-radius:999px;
      background:#dce7fa;
      border:1px solid rgba(0,0,0,.22);
    }

    .status{
      text-align:right;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      min-width:170px;
    }

    .inspectGrid{
      display:grid;
      gap:8px;
    }

    .kv{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:12px;
      color:var(--muted);
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .kv strong{
      color:var(--text);
      font-size:12px;
      font-weight:650;
    }

    .hintBox{
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.03);
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    .thermalBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:11px;
      border-radius:999px;
      padding:4px 8px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      width:max-content;
    }

    .thermalBadge.hot{
      color:#ffd9ae;
      border-color:rgba(255,190,120,.22);
      background:rgba(255,176,96,.10);
    }

    .thermalBadge.cool{
      color:#b7dcff;
      border-color:rgba(120,188,255,.22);
      background:rgba(120,188,255,.10);
    }

    code{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 6px;
      padding: 1px 5px;
    }

    @media (max-width: 980px){
      .bottom{
        grid-template-columns:1fr;
      }
      .status{
        text-align:left;
      }
      .sidebar{
        width:min(340px, calc(100vw - 28px));
      }
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <div class="hud">
    <div class="panel sidebar">
      <div class="header">
        <h1>Chem Sandbox</h1>
        <p>Build a scene, add heat, and watch a simple live chemistry model.</p>
      </div>

      <div class="searchWrap">
        <span class="searchIcon">⌕</span>
        <input id="searchInput" type="text" placeholder="Search atoms, molecules, formulas..." />
      </div>

      <div class="tabs">
        <button class="tabBtn active" data-tab="library">Library</button>
        <button class="tabBtn" data-tab="scene">Scene</button>
        <button class="tabBtn" data-tab="inspect">Inspect</button>
        <button class="tabBtn" data-tab="reactions">Reactions</button>
      </div>

      <div class="content" id="tabContent"></div>

      <div class="footerRow">
        <span id="sidebarFooterText">0 molecules in sandbox</span>
        <button id="clearBtn" class="miniBtn">Clear all</button>
      </div>
    </div>

    <div class="panel bottom">
      <div class="toolbar">
        <button id="playPauseBtn">Pause</button>
        <div class="heatActionWrap">
          <div class="heatActionRow">
            <button id="heatPulseBtn">Inject Heat</button>
            <button id="coolPulseBtn" class="miniBtn">Cool Shot</button>
            <button id="stirBtn" class="miniBtn">Stir</button>
          </div>
          <div class="heatDoseWrap">
            <div class="heatDoseLabel">
              <span id="heatDoseLabel">Heat dose</span>
              <span id="heatDoseValue">180°C</span>
            </div>
            <input id="heatDoseSlider" type="range" min="20" max="900" step="5" value="180" />
          </div>
        </div>
        <button id="timeScaleBtn">Time 1x</button>
      </div>

      <div class="rangeWrap">
        <div class="rangeHead">
          <span id="heatLabel">Temp: 25°C / 77°F</span>
          <div class="tempControls">
            <input id="tempInput" type="number" value="25" step="1" />
            <select id="tempUnitSelect">
              <option value="C">°C</option>
              <option value="F">°F</option>
              <option value="K">K</option>
            </select>
          </div>
        </div>
        <span id="simLabel" class="small">Live simulation</span>
        <input id="heatSlider" type="range" min="-50" max="2500" step="1" value="25" />
        <div class="rangeHead" style="margin-top:8px;">
          <span id="pressureLabel">Pressure: 1.00 atm</span>
        </div>
        <input id="pressureSlider" type="range" min="0.2" max="6" step="0.05" value="1" />
      </div>

      <div class="status" id="statusText">
        Running<br>
        0 molecules
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

const playPauseBtn = document.getElementById('playPauseBtn');
const clearBtn = document.getElementById('clearBtn');
const heatPulseBtn = document.getElementById('heatPulseBtn');
const coolPulseBtn = document.getElementById('coolPulseBtn');
const stirBtn = document.getElementById('stirBtn');
const timeScaleBtn = document.getElementById('timeScaleBtn');
const heatSlider = document.getElementById('heatSlider');
const heatDoseSlider = document.getElementById('heatDoseSlider');
const heatLabel = document.getElementById('heatLabel');
const heatDoseLabel = document.getElementById('heatDoseLabel');
const heatDoseValue = document.getElementById('heatDoseValue');
const tempInput = document.getElementById('tempInput');
const tempUnitSelect = document.getElementById('tempUnitSelect');
const pressureLabel = document.getElementById('pressureLabel');
const pressureSlider = document.getElementById('pressureSlider');
const simLabel = document.getElementById('simLabel');
const statusText = document.getElementById('statusText');
const tabContent = document.getElementById('tabContent');
const searchInput = document.getElementById('searchInput');
const sidebarFooterText = document.getElementById('sidebarFooterText');

const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
const TAU = Math.PI * 2;

function resize() {
  canvas.width = Math.floor(window.innerWidth * DPR);
  canvas.height = Math.floor(window.innerHeight * DPR);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  world.bounds = getVesselRect();
}
window.addEventListener('resize', resize);

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }
function rand(a, b) { return a + Math.random() * (b - a); }
function cToF(c) { return c * 9 / 5 + 32; }
function cToK(c) { return c + 273.15; }
function fToC(f) { return (f - 32) * 5 / 9; }
function kToC(k) { return k - 273.15; }
function tempToHeatLevel(celsius) {
  const k = cToK(celsius);
  return clamp((k - 273.15) / 1400, 0, 1);
}
function getEffectiveTemperatureC() {
  return clamp(world.temperatureC + world.heatPulseC, -50, 3200);
}
function getGasMoleculeCount() {
  return world.molecules.filter(m => m.alive && m.phase === 'gas').length;
}
function getEffectivePressureAtm() {
  const bounds = world.bounds;
  const area = bounds ? bounds.w * bounds.h : 420000;
  const volumeScale = clamp(420000 / Math.max(180000, area), 0.7, 1.7);
  const tempScale = clamp(cToK(getEffectiveTemperatureC()) / 298.15, 0.45, 5.5);
  const gasContribution = getGasMoleculeCount() * 0.035 * tempScale * volumeScale;
  return clamp(world.pressureAtm + gasContribution, 0.05, 12);
}
function formatThermalDelta(deltaC) {
  if (!Number.isFinite(deltaC) || Math.abs(deltaC) < 0.5) return '';
  return `${deltaC > 0 ? '+' : ''}${Math.round(deltaC)}°C`;
}
function addThermalEvent(x, y, deltaC, label = '') {
  world.thermalEvents.push({
    id: `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
    x,
    y,
    deltaC,
    label,
    age: 0,
    ttl: THERMAL_EVENT_TTL
  });
  if (world.thermalEvents.length > 48) {
    world.thermalEvents.splice(0, world.thermalEvents.length - 48);
  }
}
function applyThermalImpulse(deltaC, reason = '', options = {}) {
  if (!Number.isFinite(deltaC) || Math.abs(deltaC) < 0.1) return;
  world.heatPulseC = clamp(world.heatPulseC + deltaC, -900, 2200);
  if (deltaC > 0) world.thermalStats.addedC += deltaC;
  else world.thermalStats.removedC += Math.abs(deltaC);

  if (Number.isFinite(options.x) && Number.isFinite(options.y)) {
    addThermalEvent(options.x, options.y, deltaC, options.label || reason);
  }

  if (options.log !== false) {
    addReactionLog(
      'thermal',
      `${reason || 'Thermal change'} ${formatThermalDelta(deltaC)}`.trim(),
      { thermalDeltaC: deltaC, source: options.source || 'system', x: options.x, y: options.y }
    );
  }
}
function colorWithAlpha(hex, alpha) {
  const clean = hex.replace('#', '');
  const num = parseInt(clean, 16);
  const r = (num >> 16) & 255;
  const g = (num >> 8) & 255;
  const b = num & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
function pairKey(elA, elB) {
  return [elA, elB].sort().join('-');
}
function toSubscript(num) {
  return String(num).split('').map(d => SUBSCRIPT[d] || d).join('');
}
function prettyFormula(formula) {
  return String(formula).replace(/[0-9]+/g, m => toSubscript(m));
}
function getAtomCounts(atoms) {
  const counts = {};
  for (const atom of atoms) counts[atom.el] = (counts[atom.el] || 0) + 1;
  return counts;
}
function formatFormulaFromAtoms(atoms) {
  const counts = getAtomCounts(atoms);
  const parts = [];
  if (counts.C) {
    parts.push(`C${counts.C > 1 ? counts.C : ''}`);
    delete counts.C;
  }
  if (counts.H) {
    parts.push(`H${counts.H > 1 ? counts.H : ''}`);
    delete counts.H;
  }
  for (const el of Object.keys(counts).sort()) {
    parts.push(`${el}${counts[el] > 1 ? counts[el] : ''}`);
  }
  return parts.join('') || '?';
}
function averageElementColor(atoms) {
  let r = 0, g = 0, b = 0;
  for (const atom of atoms) {
    const hex = (elementStyles[atom.el]?.color || '#9bbcff').replace('#', '');
    const n = parseInt(hex, 16);
    r += (n >> 16) & 255;
    g += (n >> 8) & 255;
    b += n & 255;
  }
  const n = Math.max(1, atoms.length);
  const rr = Math.round(r / n).toString(16).padStart(2, '0');
  const gg = Math.round(g / n).toString(16).padStart(2, '0');
  const bb = Math.round(b / n).toString(16).padStart(2, '0');
  return `#${rr}${gg}${bb}`;
}

function plainFormula(formula) {
  return String(formula || '').replace(/[₀-₉]/g, ch => ({
    '₀': '0', '₁': '1', '₂': '2', '₃': '3', '₄': '4',
    '₅': '5', '₆': '6', '₇': '7', '₈': '8', '₉': '9'
  }[ch] || ch));
}

function formatSimTime(seconds) {
  const s = Math.max(0, Math.floor(seconds));
  const mm = String(Math.floor(s / 60)).padStart(2, '0');
  const ss = String(s % 60).padStart(2, '0');
  return `${mm}:${ss}`;
}

function addReactionLog(type, message, extra = {}) {
  if (world.time < (world.reactionLogMutedUntil || 0)) return;
  world.reactionLog.push({
    id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
    t: world.time,
    tempC: getEffectiveTemperatureC(),
    type,
    message,
    ...extra
  });
  if (world.reactionLog.length > MAX_REACTION_LOG) {
    world.reactionLog.splice(0, world.reactionLog.length - MAX_REACTION_LOG);
  }
  markSidebarDirty();
}

const THERMAL_RULE_DEFAULTS = {
  carbon_monoxide_formation: 34,
  carbon_dioxide_formation: 62,
  haloform_bleach_acetone: 18,
  water_combustion: 220,
  methane_combustion: 320,
  peroxide_formation: -28,
  peroxide_decomposition: 88,
  sodium_water_reaction: 180,
  hydrogen_chlorination: 145,
  acid_base_neutralization: 72,
  hydrogen_atom_recombination: 24,
  oxygen_atom_recombination: 42,
  ozone_formation: -18,
  ozone_decomposition: 36,
  atomic_water_assembly: 95
};

function normalizeReactionData(data) {
  const source = data && typeof data === 'object' ? data : {};
  const speciesHints = source.speciesHints && typeof source.speciesHints === 'object'
    ? { ...source.speciesHints }
    : {};
  const reactions = Array.isArray(source.reactions)
    ? source.reactions
        .filter(rule => Array.isArray(rule.reactants) && Array.isArray(rule.products))
        .map(rule => {
          const expandedReactants = [];
          for (const part of rule.reactants) {
            const count = Math.max(1, Number(part.count) || 1);
            for (let i = 0; i < count; i++) expandedReactants.push(part.type);
          }
          const rawThermalDelta = rule.thermalDeltaC;
          return {
            ...rule,
            category: rule.category || 'scripted',
            conditions: { ...(rule.conditions || {}) },
            kinetics: { ...(rule.kinetics || {}) },
            thermalDeltaC: rawThermalDelta == null
              ? (THERMAL_RULE_DEFAULTS[rule.id] || 0)
              : (Number(rawThermalDelta) || 0),
            expandedReactants
          };
        })
    : [];
  return { speciesHints, reactions };
}

async function loadReactionData() {
  try {
    const res = await fetch('./reactions.json', { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return normalizeReactionData(await res.json());
  } catch (err) {
    addReactionLog('system', `Using fallback reaction dataset (${err.message || 'load failed'})`);
    return normalizeReactionData(FALLBACK_REACTION_DATA);
  }
}

function getSpeciesHint(type) {
  return world.reactionData.speciesHints[type] || '';
}

function reactionEquation(rule) {
  return rule.displayEquation || `${rule.name || rule.id}`;
}

function getSpeciesCatalogItem(type) {
  return LIBRARY_ITEMS.find(item => item.key === type) || null;
}

function getSpeciesDisplayName(type) {
  return SPECIES[type]?.display || getSpeciesCatalogItem(type)?.name || type;
}

function getSpeciesDisplayLabel(type) {
  return SPECIES[type]?.label || getSpeciesCatalogItem(type)?.label || type;
}

function uniqueStrings(values) {
  return [...new Set(values.filter(Boolean))];
}

function formatSpeciesList(types, limit = 6) {
  const labels = uniqueStrings(types).map(getSpeciesDisplayLabel);
  if (labels.length === 0) return 'none';
  if (labels.length <= limit) return labels.join(', ');
  return `${labels.slice(0, limit).join(', ')} +${labels.length - limit} more`;
}

function getSpeciesProfile(type) {
  const rules = world.reactionData.reactions || [];
  const reactantRules = rules.filter(rule => rule.expandedReactants.includes(type));
  const productRules = rules.filter(rule => rule.products.some(part => part.type === type));

  const reactWith = uniqueStrings(
    reactantRules.flatMap(rule => rule.expandedReactants.filter(other => other !== type))
  );
  const turnsInto = uniqueStrings(
    reactantRules.flatMap(rule => rule.products.map(part => part.type)).filter(other => other !== type)
  );
  const formedFrom = uniqueStrings(
    productRules.flatMap(rule => rule.expandedReactants.filter(other => other !== type))
  );

  return {
    type,
    hint: getSpeciesHint(type),
    reactantRules,
    productRules,
    reactWith,
    turnsInto,
    formedFrom,
    ruleCount: uniqueStrings([...reactantRules.map(rule => rule.id), ...productRules.map(rule => rule.id)]).length
  };
}

function speciesBehaviorSummary(type) {
  const profile = getSpeciesProfile(type);
  const parts = [];
  const evap = EVAPORATION_CONFIG[type];
  const dissolution = DISSOLUTION_CONFIG[type];
  const ionProfile = AQUEOUS_ION_PROFILES[type];
  const weakAcid = WEAK_AQUEOUS_ACIDS[type];
  if (profile.reactWith.length) parts.push(`Reacts with ${formatSpeciesList(profile.reactWith, 4)}.`);
  if (profile.turnsInto.length) parts.push(`Can form ${formatSpeciesList(profile.turnsInto, 4)}.`);
  if (profile.formedFrom.length) parts.push(`Can be made from ${formatSpeciesList(profile.formedFrom, 4)}.`);
  if (evap) parts.push(`Evaporates near ${evap.boilC}°C and condenses below ${evap.condenseC}°C.`);
  if (dissolution) parts.push(`Dissolves into ${dissolution.solventGroup} when enough solvent is nearby.`);
  if (ionProfile) {
    parts.push(`In water it separates into ${Object.keys(ionProfile.ions).map(formatIonLabel).join(' and ')}.`);
  } else if (weakAcid && type !== 'CO2') {
    parts.push(`In water it acts as a weak acid.`);
  }
  if (type === 'CO2') parts.push('Under pressure it can dissolve into water and make carbonated water.');
  if (!parts.length) return 'No scripted reactions currently reference this species.';
  return parts.join(' ');
}

function thermalBadgeMarkup(deltaC) {
  if (!Number.isFinite(deltaC) || Math.abs(deltaC) < 0.5) return '';
  const hot = deltaC > 0;
  return `<span class="thermalBadge ${hot ? 'hot' : 'cool'}">${hot ? 'Releases' : 'Consumes'} ${Math.abs(Math.round(deltaC))}°C</span>`;
}

function thermalWindowMarkup(rule) {
  const min = Number(rule.conditions?.tempMinC);
  const max = Number(rule.conditions?.tempMaxC);
  if (!Number.isFinite(min) && !Number.isFinite(max)) return '';
  const minText = Number.isFinite(min) ? `${Math.round(min)}°C` : 'any temp';
  const maxText = Number.isFinite(max) ? `${Math.round(max)}°C` : 'any temp';
  return `<span class="thermalBadge">${minText} to ${maxText}</span>`;
}

function pressureWindowMarkup(rule) {
  const min = Number(rule.conditions?.pressureMinAtm);
  const max = Number(rule.conditions?.pressureMaxAtm);
  if (!Number.isFinite(min) && !Number.isFinite(max)) return '';
  const minText = Number.isFinite(min) ? `${min.toFixed(2)} atm` : 'any pressure';
  const maxText = Number.isFinite(max) ? `${max.toFixed(2)} atm` : 'any pressure';
  return `<span class="thermalBadge">${minText} to ${maxText}</span>`;
}

function formatReactionLogMessage(entry) {
  const parts = [entry.message];
  if (Number.isFinite(entry.thermalDeltaC) && Math.abs(entry.thermalDeltaC) >= 0.5) {
    parts.push(`(${entry.thermalDeltaC > 0 ? '+' : ''}${Math.round(entry.thermalDeltaC)}°C)`);
  }
  return parts.join(' ');
}

function renderRuleList(title, rules, emptyText) {
  const box = document.createElement('div');
  box.className = 'card';
  box.innerHTML = `
    <div class="cardTop">
      <div class="cardTitle">
        <strong>${title}</strong>
        <span>${rules.length} pathway${rules.length === 1 ? '' : 's'}</span>
      </div>
    </div>
  `;

  if (!rules.length) {
    const empty = document.createElement('div');
    empty.className = 'small';
    empty.textContent = emptyText;
    box.appendChild(empty);
    return box;
  }

  for (const rule of rules) {
    const row = document.createElement('div');
    row.className = 'hintBox';
    row.style.marginTop = '10px';
    row.innerHTML = `
      <strong style="color:var(--text)">${rule.name}</strong><br>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 8px 0;">${thermalBadgeMarkup(rule.thermalDeltaC)}${thermalWindowMarkup(rule)}${pressureWindowMarkup(rule)}</div>
      ${reactionEquation(rule)}<br>
      <span style="color:var(--muted)">${rule.note || 'Scripted pathway.'}</span>
    `;
    box.appendChild(row);
  }

  return box;
}

function reactionLogText() {
  return world.reactionLog.map(entry => {
    const stamp = `t=${formatSimTime(entry.t)} temp=${Math.round(entry.tempC)}C type=${entry.type}`;
    return `${stamp} :: ${formatReactionLogMessage(entry)}`;
  }).join('\n');
}

async function copyReactionLog() {
  const text = reactionLogText();
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    addReactionLog('system', 'Reaction log copied to clipboard');
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    addReactionLog('system', 'Reaction log copied to clipboard');
  }
  markSidebarDirty();
}

function exportReactionLog() {
  const text = reactionLogText();
  if (!text) return;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `chem-reactions-${Date.now()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  addReactionLog('system', 'Reaction log exported to file');
  markSidebarDirty();
}

function addMolecule(type, x, y, options = {}) {
  const spec = SPECIES[type];
  if (!spec) return null;
  const select = options.select !== false;
  const layoutScale = options.layoutScale ?? 1.08;

  const bounds = world.bounds;
  const cx = x ?? rand(bounds.x + 80, bounds.x + bounds.w - 80);
  const cy = y ?? rand(bounds.y + 80, bounds.y + bounds.h - 80);
  const atoms = buildAtomsForSpecies(type, cx, cy);

  if (atoms.length > 1 && layoutScale !== 1) {
    for (const atom of atoms) {
      atom.x = cx + (atom.x - cx) * layoutScale;
      atom.y = cy + (atom.y - cy) * layoutScale;
    }
  }

  const shapeConstraints = [];

  for (let i = 0; i < atoms.length; i++) {
    for (let j = i + 1; j < atoms.length; j++) {
      const dx = atoms[j].x - atoms[i].x;
      const dy = atoms[j].y - atoms[i].y;
      const rest = Math.hypot(dx, dy);
      if (!Number.isFinite(rest) || rest < 8) continue;
      const bonded = spec.bonds.some(b =>
        (b.a === i && b.b === j) || (b.a === j && b.b === i)
      );
      shapeConstraints.push({
        a: i,
        b: j,
        rest,
        strength: bonded ? 0.16 : 0.07,
        damping: bonded ? 0.18 : 0.12,
        wobble: bonded ? 0.03 : 0.045,
        phase: Math.random() * TAU,
        minDist: Math.max(atoms[i].r + atoms[j].r - 4, rest * 0.54)
      });
    }
  }

  const mol = {
    id: nextMolId++,
    type,
    label: spec.label,
    display: spec.display,
    phase: spec.phase,
    density: spec.density,
    miscibleGroup: spec.miscibleGroup,
    nativePhase: spec.phase,
    color: spec.color,
    formula: spec.formula,
    atoms,
    bonds: spec.bonds.map(b => ({ age: 45, strain: 0, core: true, ...b, rest: b.rest * layoutScale })),
    angleConstraints: (spec.angleConstraints || []).map(a => ({ ...a })),
    shapeConstraints,
    dissolved: false,
    reactionProgress: {},
    alive: true
  };

  world.molecules.push(mol);
  if (select) world.selectedMolId = mol.id;
  markSidebarDirty();
  return mol;
}

function setMoleculePhaseMode(mol, nextPhase) {
  const config = EVAPORATION_CONFIG[mol.type];
  if (!config || mol.phase === nextPhase) return;

  if (nextPhase === 'gas') {
    mol.phase = 'gas';
    mol.density = config.gasDensity;
    mol.miscibleGroup = config.gasMiscibleGroup;
  } else {
    mol.phase = mol.nativePhase || 'liquid';
    mol.density = config.liquidDensity;
    mol.miscibleGroup = config.liquidMiscibleGroup;
  }
}

function setMoleculeDissolvedState(mol, dissolved) {
  const config = DISSOLUTION_CONFIG[mol.type];
  if (!config) return;

  mol.dissolved = dissolved;
  if (dissolved) {
    mol.phase = 'liquid';
    mol.density = config.dissolvedDensity;
    mol.miscibleGroup = config.solventGroup;
  } else {
    mol.phase = mol.nativePhase || 'particle';
    mol.density = SPECIES[mol.type]?.density ?? mol.density;
    mol.miscibleGroup = SPECIES[mol.type]?.miscibleGroup || mol.miscibleGroup;
  }
}

function isWaterPhaseMolecule(mol) {
  if (!mol?.alive || mol.phase !== 'liquid') return false;
  if (mol.miscibleGroup === 'water') return true;
  return mol.dissolved && DISSOLUTION_CONFIG[mol.type]?.solventGroup === 'water';
}

function formatIonLabel(ion) {
  const withSubscripts = prettyFormula(ion.replace('^', ''));
  return withSubscripts
    .replace('2-', '²⁻')
    .replace('+', '⁺')
    .replace('-', '⁻');
}

function getWaterChemistrySnapshot() {
  const aqueous = world.molecules.filter(isWaterPhaseMolecule);
  if (!aqueous.length) return null;

  const speciesCounts = {};
  const ionCounts = {};
  let waterCount = 0;
  let acidUnits = 0;
  let baseUnits = 0;
  let conductivity = 0;

  for (const mol of aqueous) {
    speciesCounts[mol.type] = (speciesCounts[mol.type] || 0) + 1;
    if (mol.type === 'H2O') waterCount += 1;

    const ionProfile = AQUEOUS_ION_PROFILES[mol.type];
    if (ionProfile) {
      for (const [ion, count] of Object.entries(ionProfile.ions)) {
        ionCounts[ion] = (ionCounts[ion] || 0) + count;
        conductivity += count;
      }
      if (ionProfile.ions['H3O+']) acidUnits += ionProfile.ions['H3O+'];
      if (ionProfile.ions['OH-']) baseUnits += ionProfile.ions['OH-'];
      if (ionProfile.ions['CO3^2-']) baseUnits += ionProfile.ions['CO3^2-'] * 0.7;
      if (ionProfile.ions['HCO3-']) baseUnits += ionProfile.ions['HCO3-'] * 0.16;
      if (ionProfile.ions['OCl-']) baseUnits += ionProfile.ions['OCl-'] * 0.18;
      if (ionProfile.ions['CH3COO-']) baseUnits += ionProfile.ions['CH3COO-'] * 0.1;
    }

    const weak = WEAK_AQUEOUS_ACIDS[mol.type];
    if (weak) {
      acidUnits += weak.acidUnits;
      ionCounts['H3O+'] = (ionCounts['H3O+'] || 0) + weak.acidUnits * 0.45;
      if (weak.ionLabel) ionCounts[weak.ionLabel] = (ionCounts[weak.ionLabel] || 0) + weak.acidUnits * 0.45;
    }
  }

  const dissolvedTypes = Object.keys(speciesCounts)
    .filter(type => type !== 'H2O')
    .sort((a, b) => speciesCounts[b] - speciesCounts[a]);
  const scale = Math.max(6, waterCount * 0.22 + dissolvedTypes.reduce((sum, type) => sum + speciesCounts[type], 0) * 0.9);
  const delta = (baseUnits - acidUnits) / scale;
  const pH = clamp(7 + Math.sign(delta) * Math.log10(1 + Math.abs(delta) * 42) * 3.15, 0, 14);
  const majorIons = Object.entries(ionCounts)
    .filter(([, count]) => count >= 0.4)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 4)
    .map(([ion, count]) => ({ ion, count }));

  return {
    aqueousCount: aqueous.length,
    waterCount,
    speciesCounts,
    dissolvedTypes,
    ionCounts,
    majorIons,
    conductivity,
    acidity: acidUnits,
    basicity: baseUnits,
    pH,
    isCarbonated: (speciesCounts.CO2 || 0) > 0
  };
}

function clearWorld() {
  world.molecules = [];
  world.stats.reactions = 0;
  world.selectedMolId = null;
  world.pressureAtm = 1;
  world.heatPulseC = 0;
  world.stirring.timeLeft = 0;
  world.stirring.power = 0;
  world.thermalEvents = [];
  world.thermalStats.addedC = 0;
  world.thermalStats.removedC = 0;
  addReactionLog('system', 'Sandbox cleared');
  markSidebarDirty();
}

function moleculeCenter(mol) {
  let mx = 0, my = 0, m = 0;
  for (const a of mol.atoms) {
    mx += a.x * a.m;
    my += a.y * a.m;
    m += a.m;
  }
  return { x: mx / m, y: my / m };
}

function getLiquidLayerKey(mol) {
  if (mol.dissolved) return DISSOLUTION_CONFIG[mol.type]?.solventGroup || mol.miscibleGroup || mol.type;
  return mol.type;
}

function getLiquidLayerLayout() {
  const b = world.bounds;
  if (!b) return { surfaceY: null, liquidHeight: 0, layers: [] };
  const waterChemistry = getWaterChemistrySnapshot();

  const liquids = world.molecules.filter(m => m.alive && m.phase === 'liquid');
  const groups = {};

  for (const mol of liquids) {
    const key = getLiquidLayerKey(mol);
    if (!groups[key]) groups[key] = [];
    groups[key].push(mol);
  }

  const layers = Object.entries(groups)
    .map(([layerKey, arr]) => {
      const sample = arr[0];
      const preferredType = layerKey === 'water'
        ? 'H2O'
        : sample.type;
      const spec = SPECIES[preferredType] || SPECIES[sample.type] || sample;
      const dissolvedCounts = {};
      for (const mol of arr) {
        if (!mol.dissolved) continue;
        dissolvedCounts[mol.type] = (dissolvedCounts[mol.type] || 0) + 1;
      }
      const dissolvedTypes = Object.keys(dissolvedCounts)
        .sort((a, b2) => dissolvedCounts[b2] - dissolvedCounts[a]);
      return {
        layerKey,
        count: arr.length,
        density: spec?.density ?? sample?.density ?? 1.0,
        color: spec?.color || sample?.color || '#9bbcff',
        dissolvedTypes,
        chemistry: layerKey === 'water' ? waterChemistry : null
      };
    })
    .sort((a, b2) => a.density - b2.density);

  if (!layers.length) return { surfaceY: null, liquidHeight: 0, layers: [] };

  const total = layers.reduce((sum, layer) => sum + layer.count, 0);
  const liquidHeight = Math.min(b.h * 0.7, total * 13);
  let y = b.y + b.h - liquidHeight;

  for (const layer of layers) {
    const h = liquidHeight * (layer.count / total);
    layer.y = y;
    layer.h = h;
    layer.centerY = y + h * 0.5;
    y += h;
  }

  return {
    surfaceY: b.y + b.h - liquidHeight,
    liquidHeight,
    layers
  };
}

function confineMoleculeToPhaseZone(mol, b, liquidLayout, dt) {
  const center = moleculeCenter(mol);
  const radius = moleculeRadius(mol);
  const left = b.x + 14;
  const right = b.x + b.w - 14;
  const top = b.y + 14;
  const bottom = b.y + b.h - 14;

  let minAllowedY = top;
  let maxAllowedY = bottom;
  let targetY = null;
  let softRange = null;

  if (mol.phase === 'liquid') {
    const layer = liquidLayout.layers.find(entry => entry.layerKey === getLiquidLayerKey(mol));
    if (layer) {
      targetY = layer.centerY;
      softRange = {
        min: layer.y - Math.max(18, layer.h * 0.35),
        max: layer.y + layer.h + Math.max(18, layer.h * 0.35)
      };
    } else if (liquidLayout.surfaceY != null) {
      minAllowedY = liquidLayout.surfaceY + radius;
    }
  } else if (mol.phase === 'gas') {
    const isDragged = world.dragging.mol && world.dragging.mol.id === mol.id;
    const isSubmerged = liquidLayout.surfaceY != null && center.y > liquidLayout.surfaceY + radius * 0.35;
    const gasCeiling = liquidLayout.surfaceY == null
      ? bottom
      : Math.max(top + radius, liquidLayout.surfaceY - radius - 6);
    minAllowedY = top;
    maxAllowedY = (isDragged || isSubmerged) ? bottom : gasCeiling;
    targetY = top + (maxAllowedY - top) * 0.35;
  }

  if (targetY != null && Number.isFinite(targetY)) {
    let pullScale = 0.0035;
    if (mol.phase === 'liquid' && softRange) {
      const overshootTop = Math.max(0, softRange.min - center.y);
      const overshootBottom = Math.max(0, center.y - softRange.max);
      const overshoot = overshootTop + overshootBottom;
      pullScale = overshoot > 0
        ? (0.006 + overshoot * 0.00018)
        : 0.0011;
    }

    const pull = (targetY - center.y) * pullScale * dt * 60;
    for (const atom of mol.atoms) {
      atom.vy += pull;
    }
  }

  let shiftX = 0;
  let shiftY = 0;
  if (center.x < left + radius) shiftX = left + radius - center.x;
  else if (center.x > right - radius) shiftX = right - radius - center.x;

  if (center.y < minAllowedY) shiftY = minAllowedY - center.y;
  else if (center.y > maxAllowedY) shiftY = maxAllowedY - center.y;

  if (shiftX !== 0 || shiftY !== 0) {
    for (const atom of mol.atoms) {
      atom.x += shiftX;
      atom.y += shiftY;
      if (shiftX !== 0) atom.vx *= -0.32;
      if (shiftY !== 0) atom.vy *= -0.22;
    }
  }
}

function moleculeVelocity(mol) {
  let vx = 0, vy = 0;
  for (const a of mol.atoms) {
    vx += a.vx;
    vy += a.vy;
  }
  return { vx: vx / mol.atoms.length, vy: vy / mol.atoms.length };
}

function usedValence(mol, atomIndex) {
  let used = 0;
  for (const bond of mol.bonds) {
    if (bond.a === atomIndex || bond.b === atomIndex) used += bond.order || 1;
  }
  return used;
}

function getBondBetween(mol, idxA, idxB) {
  return mol.bonds.find(b =>
    (b.a === idxA && b.b === idxB) ||
    (b.a === idxB && b.b === idxA)
  ) || null;
}

function getElectronState(mol, atomIndex) {
  const atom = mol.atoms[atomIndex];
  const el = atom.el;
  const valenceElectrons = VALENCE_ELECTRONS[el] ?? 0;
  const preferredBonds = TARGET_VALENCE[el] ?? 0;
  const shellCapacity = SHELL_TARGET_ELECTRONS[el] ?? (valenceElectrons <= 2 ? 2 : 8);
  const bondOrder = usedValence(mol, atomIndex);
  const partialCharge = clamp(atom.charge || 0, -2, 2);
  const bondElectronsOwned = bondOrder;
  const nonbondingElectrons = clamp(
    Math.round(valenceElectrons - bondElectronsOwned - partialCharge),
    0,
    shellCapacity
  );
  const lonePairs = Math.floor(nonbondingElectrons / 2);
  const radicalElectrons = nonbondingElectrons % 2;
  const vacancies = Math.max(0, preferredBonds - bondOrder);
  const shellElectrons = clamp(bondOrder * 2 + nonbondingElectrons, 0, shellCapacity + 2);
  const shellFill = clamp(shellElectrons / Math.max(1, shellCapacity), 0, 1.25);
  const donorStrength = lonePairs + radicalElectrons * 1.35 + clamp(-partialCharge, 0, 2) * 0.9;
  const acceptorStrength = vacancies + clamp(partialCharge, 0, 2) * 0.85;
  const electronPressure = vacancies * 0.95 + radicalElectrons * 1.25 + Math.abs(partialCharge) * 0.35;
  const closedShell = vacancies === 0 && radicalElectrons === 0 && shellFill >= 0.95;

  return {
    el,
    valenceElectrons,
    preferredBonds,
    shellCapacity,
    bondOrder,
    nonbondingElectrons,
    lonePairs,
    radicalElectrons,
    vacancies,
    shellElectrons,
    shellFill,
    donorStrength,
    acceptorStrength,
    electronPressure,
    closedShell
  };
}

function projectedShellElectrons(mol, atomIndex, extraBondOrder = 0) {
  const state = getElectronState(mol, atomIndex);
  const bondOrder = state.bondOrder + extraBondOrder;
  const sharedElectrons = bondOrder * 2;
  const shellTarget = state.shellCapacity;
  return {
    el: state.el,
    sharedElectrons,
    shellTarget,
    overfilled: shellTarget > 0 && sharedElectrons > shellTarget
  };
}

function freeValence(mol, atomIndex) {
  return getElectronState(mol, atomIndex).vacancies;
}

function atomSaturation(mol, atomIndex) {
  return getElectronState(mol, atomIndex).shellFill;
}

function getLoneElectronCount(mol, atomIndex) {
  return Math.min(8, getElectronState(mol, atomIndex).nonbondingElectrons);
}

function moleculeSaturation(mol) {
  if (!mol || !mol.atoms || mol.atoms.length === 0) return 0;
  let total = 0;
  for (let i = 0; i < mol.atoms.length; i++) {
    total += atomSaturation(mol, i);
  }
  return total / mol.atoms.length;
}

function bondNeighborhoodSupport(mol, bond) {
  const aNeighbors = mol.bonds.filter(b => (b.a === bond.a || b.b === bond.a) && b !== bond).length;
  const bNeighbors = mol.bonds.filter(b => (b.a === bond.b || b.b === bond.b) && b !== bond).length;
  return clamp((aNeighbors + bNeighbors) / 4, 0, 1.1);
}

function bondPolarity(elA, elB, ionic = false, order = 1) {
  const enA = ELECTRONEGATIVITY[elA] || 2;
  const enB = ELECTRONEGATIVITY[elB] || 2;
  const delta = clamp((enB - enA) / 2.6, -1, 1);
  const scale = ionic ? 0.9 : (0.16 + Math.abs(delta) * 0.30);
  return delta * scale * order;
}

function refreshMoleculeCharges(mol) {
  for (const atom of mol.atoms) atom.charge = 0;

  for (const bond of mol.bonds) {
    const a = mol.atoms[bond.a];
    const b = mol.atoms[bond.b];
    const shift = bondPolarity(a.el, b.el, !!bond.ionic, bond.order || 1);
    a.charge += shift;
    b.charge -= shift;
  }

  for (let i = 0; i < mol.atoms.length; i++) {
    const atom = mol.atoms[i];
    const missing = freeValence(mol, i);
    if (missing <= 0) continue;

    if (atom.el === 'Na') atom.charge += 0.18 * missing;
    if (atom.el === 'O' || atom.el === 'Cl') atom.charge -= 0.08 * missing;
    if (atom.el === 'H' && mol.atoms.length > 1) atom.charge += 0.04 * missing;
  }
}

function refreshAllCharges() {
  for (const mol of world.molecules) {
    if (!mol.alive) continue;
    refreshMoleculeCharges(mol);
  }
}

function electrostaticPairBias(atomA, atomB) {
  const qProduct = atomA.charge * atomB.charge;
  return clamp((-qProduct * 3.8), -0.85, 1.8);
}

function atomReactivityScore(mol, atomIndex) {
  const atom = mol.atoms[atomIndex];
  const state = getElectronState(mol, atomIndex);
  const polarity = Math.abs(atom.charge || 0);
  let score = state.electronPressure + state.donorStrength * 0.22 + state.acceptorStrength * 0.24 + (1 - Math.min(1, state.shellFill)) * 0.6 + polarity * 0.65;
  if (mol.atoms.length === 1) score += 0.45;
  if (atom.el === 'Na' || atom.el === 'Cl' || atom.el === 'O') score += 0.08 * state.vacancies;
  return score;
}

function moleculeReactiveScore(mol) {
  let best = 0;
  for (let i = 0; i < mol.atoms.length; i++) {
    best = Math.max(best, atomReactivityScore(mol, i));
  }
  return best;
}

function isClosedShellMolecule(mol) {
  if (!mol || mol.atoms.length <= 1) return false;
  for (let i = 0; i < mol.atoms.length; i++) {
    if (!getElectronState(mol, i).closedShell) return false;
  }
  return moleculeSaturation(mol) >= 0.97;
}

function canPairFormBond(molA, idxA, molB, idxB, ambientTempC) {
  const a = molA.atoms[idxA];
  const b = molB.atoms[idxB];
  const stateA = getElectronState(molA, idxA);
  const stateB = getElectronState(molB, idxB);
  const pair = pairKey(a.el, b.el);
  const monoA = molA.atoms.length === 1;
  const monoB = molB.atoms.length === 1;
  const electronMatch =
    (stateA.acceptorStrength > 0.25 && stateB.donorStrength > 0.25) ||
    (stateB.acceptorStrength > 0.25 && stateA.donorStrength > 0.25) ||
    (stateA.radicalElectrons > 0 && stateB.radicalElectrons > 0);

  if (!electronMatch) return false;

  if (pair === 'H-H') return monoA && monoB;
  if (pair === 'Cl-Cl') return monoA && monoB;
  if (pair === 'O-O') {
    if (monoA && monoB) return true;
    return ambientTempC > 280 && (atomReactivityScore(molA, idxA) > 0.95 || atomReactivityScore(molB, idxB) > 0.95);
  }
  if (pair === 'C-C' && ambientTempC < 420) {
    return monoA && monoB;
  }
  return true;
}

function inferMetaFromAtoms(atoms) {
  const formula = formatFormulaFromAtoms(atoms);
  const preset = FORMULA_META[formula];
  if (preset) return { ...preset, formula, display: NAMED_FORMULAS[formula] || formula };

  const hasNa = atoms.some(a => a.el === 'Na');
  const hasO = atoms.some(a => a.el === 'O');
  const hasCl = atoms.some(a => a.el === 'Cl');
  const heavy = atoms.reduce((s, a) => s + (elementStyles[a.el]?.m || 12), 0) / Math.max(1, atoms.length);
  const phase = heavy > 22 ? 'liquid' : 'gas';
  const miscibleGroup = hasNa ? 'salt' : (hasO ? 'water' : (hasCl ? 'halogen' : 'organic-light'));
  return {
    formula,
    display: NAMED_FORMULAS[formula] || formula,
    phase,
    density: clamp(heavy / 12, 0.2, 2.6),
    miscibleGroup,
    color: averageElementColor(atoms)
  };
}

function reindexConstraints(constraints, mapOldToNew) {
  const out = [];
  for (const c of constraints) {
    if (mapOldToNew[c.center] == null || mapOldToNew[c.a] == null || mapOldToNew[c.b] == null) continue;
    out.push({
      center: mapOldToNew[c.center],
      a: mapOldToNew[c.a],
      b: mapOldToNew[c.b],
      angle: c.angle
    });
  }
  return out;
}

function rebuildMoleculeMeta(mol) {
  if (mol.atoms.length === 1) {
    const el = mol.atoms[0].el;
    mol.formula = el;
    mol.label = el;
    mol.display = `${el} atom`;
    mol.phase = 'particle';
    mol.density = 0.5;
    mol.miscibleGroup = 'particle';
    mol.color = elementStyles[el]?.color || '#9bbcff';
    mol.type = `atom-${el}`;
    return;
  }
  const meta = inferMetaFromAtoms(mol.atoms);
  mol.formula = prettyFormula(meta.formula);
  mol.display = meta.display;
  mol.label = prettyFormula(meta.formula);
  mol.phase = meta.phase;
  mol.density = meta.density;
  mol.miscibleGroup = meta.miscibleGroup;
  mol.color = meta.color;
  mol.type = `dyn-${meta.formula}`;
}

function splitDisconnectedMolecule(mol) {
  if (mol.atoms.length <= 1 || mol.bonds.length === 0) {
    rebuildMoleculeMeta(mol);
    return [mol];
  }

  const adj = mol.atoms.map(() => []);
  for (const b of mol.bonds) {
    adj[b.a].push(b.b);
    adj[b.b].push(b.a);
  }

  const seen = new Array(mol.atoms.length).fill(false);
  const components = [];
  for (let i = 0; i < mol.atoms.length; i++) {
    if (seen[i]) continue;
    const stack = [i];
    seen[i] = true;
    const comp = [];
    while (stack.length) {
      const cur = stack.pop();
      comp.push(cur);
      for (const n of adj[cur]) {
        if (!seen[n]) {
          seen[n] = true;
          stack.push(n);
        }
      }
    }
    components.push(comp);
  }

  if (components.length === 1) {
    rebuildMoleculeMeta(mol);
    return [mol];
  }

  const produced = [];
  for (const comp of components) {
    const mapOldToNew = {};
    const atoms = comp.map((oldIdx, newIdx) => {
      mapOldToNew[oldIdx] = newIdx;
      return mol.atoms[oldIdx];
    });
    const bonds = mol.bonds
      .filter(b => mapOldToNew[b.a] != null && mapOldToNew[b.b] != null)
      .map(b => ({ ...b, a: mapOldToNew[b.a], b: mapOldToNew[b.b] }));
    const angleConstraints = reindexConstraints(mol.angleConstraints || [], mapOldToNew);

    const newMol = {
      id: nextMolId++,
      type: 'dynamic',
      label: '',
      display: '',
      phase: 'particle',
      density: 0.8,
      miscibleGroup: 'particle',
      color: '#9bbcff',
      formula: '',
      atoms,
      bonds,
      angleConstraints,
      alive: true
    };
    rebuildMoleculeMeta(newMol);
    produced.push(newMol);
  }

  mol.alive = false;
  world.molecules.push(...produced);
  return produced;
}

function mergeMoleculesWithBond(molA, idxA, molB, idxB, order = 1, ionic = false) {
  if (!molA.alive || !molB.alive || molA.id === molB.id) return null;
  const beforeA = plainFormula(molA.formula);
  const beforeB = plainFormula(molB.formula);

  const offset = molA.atoms.length;
  const atoms = [...molA.atoms, ...molB.atoms];
  const bonds = [
    ...molA.bonds.map(b => ({ ...b })),
    ...molB.bonds.map(b => ({ ...b, a: b.a + offset, b: b.b + offset })),
    {
      a: idxA,
      b: idxB + offset,
      order,
      rest: BOND_REST[pairKey(molA.atoms[idxA].el, molB.atoms[idxB].el)] || (28 + Math.random() * 5),
      age: 0,
      strain: 0,
      ionic
    }
  ];
  const angleConstraints = [
    ...(molA.angleConstraints || []).map(a => ({ ...a })),
    ...(molB.angleConstraints || []).map(a => ({ ...a, center: a.center + offset, a: a.a + offset, b: a.b + offset }))
  ];

  if (ionic) {
    atoms[idxA].charge = atoms[idxA].charge || 0;
    atoms[idxB + offset].charge = atoms[idxB + offset].charge || 0;
    if (atoms[idxA].el === 'Na') atoms[idxA].charge = +1;
    if (atoms[idxB + offset].el === 'Na') atoms[idxB + offset].charge = +1;
    if (atoms[idxA].el === 'Cl' || atoms[idxA].el === 'O') atoms[idxA].charge = -1;
    if (atoms[idxB + offset].el === 'Cl' || atoms[idxB + offset].el === 'O') atoms[idxB + offset].charge = -1;
  }

  const merged = {
    id: nextMolId++,
    type: 'dynamic',
    label: '',
    display: '',
    phase: 'particle',
    density: 0.8,
    miscibleGroup: 'particle',
    color: '#9bbcff',
    formula: '',
    atoms,
    bonds,
    angleConstraints,
    alive: true
  };
  rebuildMoleculeMeta(merged);
  const formed = plainFormula(merged.formula);

  molA.alive = false;
  molB.alive = false;
  world.molecules.push(merged);
  world.stats.reactions += 1;
  const aEl = molA.atoms[idxA]?.el || '?';
  const bEl = molB.atoms[idxB]?.el || '?';
  addReactionLog(
    'form-bond',
    `${beforeA} + ${beforeB} -> ${formed} (${aEl}-${bEl}${order > 1 ? ` order ${order}` : ''}${ionic ? ', ionic' : ''})`
  );
  markSidebarDirty();
  return merged;
}

function canAttemptBond(molA, idxA, molB, idxB, ambientTempC) {
  const a = molA.atoms[idxA];
  const b = molB.atoms[idxB];
  const stateA = getElectronState(molA, idxA);
  const stateB = getElectronState(molB, idxB);
  const reactiveA = atomReactivityScore(molA, idxA);
  const reactiveB = atomReactivityScore(molB, idxB);
  const molReactiveA = moleculeReactiveScore(molA);
  const molReactiveB = moleculeReactiveScore(molB);

  if (stateA.vacancies <= 0 && stateA.radicalElectrons === 0 && stateA.acceptorStrength < 0.2) return false;
  if (stateB.vacancies <= 0 && stateB.radicalElectrons === 0 && stateB.acceptorStrength < 0.2) return false;
  if (a.el === 'Na' && b.el === 'Na') return false;
  if ((a.el === 'Na' || b.el === 'Na') && !(['Cl', 'O'].includes(a.el) && ['Cl', 'O'].includes(b.el))) return false;
  if (!canPairFormBond(molA, idxA, molB, idxB, ambientTempC)) return false;
  if (a.el === 'C' && b.el === 'C' && ambientTempC < 650) {
    const monoA = molA.atoms.length === 1 && molA.type === 'atom-C';
    const monoB = molB.atoms.length === 1 && molB.type === 'atom-C';
    if (!(monoA && monoB)) return false;
  }
  if (
    ambientTempC < 260 &&
    isClosedShellMolecule(molA) &&
    isClosedShellMolecule(molB) &&
    molReactiveA < 0.82 &&
    molReactiveB < 0.82
  ) return false;
  if (
    molA.atoms.length > 2 &&
    molB.atoms.length > 2 &&
    reactiveA < 1.15 &&
    reactiveB < 1.15 &&
    ambientTempC < 520
  ) return false;
  if (projectedShellElectrons(molA, idxA, 1).overfilled || projectedShellElectrons(molB, idxB, 1).overfilled) return false;
  const dEN = Math.abs((ELECTRONEGATIVITY[a.el] || 2) - (ELECTRONEGATIVITY[b.el] || 2));
  if (dEN > 2.4 && !(a.el === 'Na' || b.el === 'Na')) return false;
  return true;
}

function runValenceChemistry(ambientTempC, ambientHeat, dt) {
  let changed = false;
  const tempK = cToK(ambientTempC);
  const atoms = [];
  for (const mol of world.molecules) {
    if (!mol.alive) continue;
    for (let i = 0; i < mol.atoms.length; i++) atoms.push({ mol, idx: i, atom: mol.atoms[i] });
  }

  const formationScale = clamp(0.72 + ambientHeat * 1.10, 0.65, 2.1);
  const coolBonus = ambientTempC < 250 ? 1.25 : 1.0;
  const hotPenalty = ambientTempC > 1800 ? 0.65 : 1.0;
  const formLimit = 4 + Math.floor(atoms.length / 35);
  let formedThisStep = 0;
  for (let i = 0; i < atoms.length; i++) {
    const A = atoms[i];
    if (!A.mol.alive) continue;
    for (let j = i + 1; j < atoms.length; j++) {
      const B = atoms[j];
      if (!B.mol.alive || A.mol.id === B.mol.id) continue;
      if (!canAttemptBond(A.mol, A.idx, B.mol, B.idx, ambientTempC)) continue;

      const dx = B.atom.x - A.atom.x;
      const dy = B.atom.y - A.atom.y;
      const d = Math.hypot(dx, dy);
      const cutoff = A.atom.r + B.atom.r + 7;
      const attractRange = cutoff + 22;
      if (d <= attractRange && d > 1e-3) {
        const nx = dx / d;
        const ny = dy / d;
        const ionicPair = (A.atom.el === 'Na' && (B.atom.el === 'Cl' || B.atom.el === 'O')) ||
                          (B.atom.el === 'Na' && (A.atom.el === 'Cl' || A.atom.el === 'O'));
        const pull = ionicPair ? 0.08 : 0.028;
        A.atom.fx += nx * pull;
        A.atom.fy += ny * pull;
        B.atom.fx -= nx * pull;
        B.atom.fy -= ny * pull;
      }
      if (d > cutoff) continue;

      const kPair = pairKey(A.atom.el, B.atom.el);
      const ionic = (A.atom.el === 'Na' || B.atom.el === 'Na') && (A.atom.el !== 'H' && B.atom.el !== 'H');
      const dEN = Math.abs((ELECTRONEGATIVITY[A.atom.el] || 2) - (ELECTRONEGATIVITY[B.atom.el] || 2));
      const chemBias = ionic ? 1.35 : clamp(0.55 + dEN * 0.22, 0.4, 1.3);
      const proximity = clamp((cutoff - d) / cutoff, 0, 1);
      const relSpeed = Math.hypot(A.atom.vx - B.atom.vx, A.atom.vy - B.atom.vy);
      const speedFactor = clamp(relSpeed / 2.4, 0.25, 1.45);
      const electronA = getElectronState(A.mol, A.idx);
      const electronB = getElectronState(B.mol, B.idx);
      const donorAcceptorFit = clamp(
        electronA.acceptorStrength * electronB.donorStrength +
        electronB.acceptorStrength * electronA.donorStrength +
        electronA.radicalElectrons * electronB.radicalElectrons * 1.2,
        0.05,
        4.5
      );
      const localNeed = clamp(0.55 + (electronA.electronPressure + electronB.electronPressure) * 0.42, 0.55, 2.3);
      const molSatA = moleculeSaturation(A.mol);
      const molSatB = moleculeSaturation(B.mol);
      const siteReactiveA = atomReactivityScore(A.mol, A.idx);
      const siteReactiveB = atomReactivityScore(B.mol, B.idx);
      const moleculeReactiveA = moleculeReactiveScore(A.mol);
      const moleculeReactiveB = moleculeReactiveScore(B.mol);
      const unsaturatedBoost = clamp(1.75 - ((molSatA + molSatB) * 0.5), 0.72, 1.5);
      const phaseAffinity = (
        A.mol.miscibleGroup === B.mol.miscibleGroup ||
        (A.mol.phase === 'gas' && B.mol.phase === 'gas') ||
        (A.mol.miscibleGroup === 'water' && B.mol.miscibleGroup === 'salt') ||
        (A.mol.miscibleGroup === 'salt' && B.mol.miscibleGroup === 'water')
      ) ? 1.14 : 0.94;
      const stableMoleculePenalty = (
        isClosedShellMolecule(A.mol) &&
        isClosedShellMolecule(B.mol) &&
        ambientTempC < 260
      ) ? 0.04 : 1.0;
      const oligomerPenalty = (
        A.mol.atoms.length > 2 &&
        B.mol.atoms.length > 2 &&
        ambientTempC < 520
      ) ? 0.16 : 1.0;
      const reactiveSiteBoost = clamp(0.35 + donorAcceptorFit * 0.28 + (siteReactiveA + siteReactiveB) * 0.45 + (moleculeReactiveA + moleculeReactiveB) * 0.12, 0.35, 2.6);
      const electroBias = 1 + electrostaticPairBias(A.atom, B.atom);
      const collisionWindow = clamp(1.20 - Math.abs(relSpeed - 1.25) / 2.1, 0.30, 1.28);
      const Ea = FORMATION_EA_K[kPair] || 1200;
      const thermalFactor = Math.exp(-Ea / Math.max(240, tempK));
      const chance = (0.0015 + 0.065 * proximity * chemBias * formationScale * coolBonus * hotPenalty * speedFactor * collisionWindow * thermalFactor * localNeed * unsaturatedBoost * phaseAffinity * electroBias * reactiveSiteBoost * stableMoleculePenalty * oligomerPenalty) * (dt * 60);
      if (Math.random() > chance) continue;

      let order = 1;
      if (kPair === 'O-O' && freeValence(A.mol, A.idx) > 1 && freeValence(B.mol, B.idx) > 1 && ambientHeat < 0.55) {
        order = 2;
      }
      const merged = mergeMoleculesWithBond(A.mol, A.idx, B.mol, B.idx, order, ionic);
      if (!merged) continue;
      changed = true;
      formedThisStep += 1;
      if (formedThisStep >= formLimit) break;
      break;
    }
    if (formedThisStep >= formLimit) break;
  }

  for (const mol of world.molecules) {
    if (!mol.alive || mol.bonds.length === 0) continue;

    for (let bi = mol.bonds.length - 1; bi >= 0; bi--) {
      const bond = mol.bonds[bi];
      const a = mol.atoms[bond.a];
      const b = mol.atoms[bond.b];
      bond.age = (bond.age ?? 0) + dt * 60;
      const k = pairKey(a.el, b.el);
      const stability = (BOND_STABILITY[k] || 0.58) * (bond.order > 1 ? 1.35 : 1.0) * (bond.ionic ? 1.20 : 1.0);
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const d = Math.hypot(dx, dy) || 1e-6;
      const nx = dx / d;
      const ny = dy / d;
      const reln = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
      const stretch = Math.max(0, Math.hypot(dx, dy) - (bond.rest || 30));
      const stress = clamp(stretch / 22, 0, 1);
      bond.strain = (bond.strain ?? stress) * 0.90 + stress * 0.10;
      const sustainedStress = Math.max(stress, bond.strain * 0.92);
      const bondEa = 2600 * stability * (bond.order > 1 ? 1.25 : 1.0) * (bond.ionic ? 1.2 : 1.0);
      const thermalBreak = Math.exp(-bondEa / Math.max(240, tempK));
      const molSat = moleculeSaturation(mol);
      const localSat = (atomSaturation(mol, bond.a) + atomSaturation(mol, bond.b)) * 0.5;
      const neighborhoodSupport = bondNeighborhoodSupport(mol, bond);
      const condensedShield = (mol.phase === 'liquid' || mol.miscibleGroup === 'salt') ? 0.88 : 1.0;
      const vibrationalStress = clamp(Math.abs(reln) / (1.8 + stability * 1.2), 0, 1.4);
      let breakChance = clamp((0.000008 + sustainedStress * sustainedStress * 0.0011 + vibrationalStress * vibrationalStress * 0.00055 + thermalBreak * 0.0014) * (dt * 60), 0, 0.05);
      if (bond.age < 45) breakChance *= 0.06;
      if (ambientTempC < 140 && sustainedStress < 0.72) breakChance *= 0.05;
      if (k === 'H-H' && ambientTempC < 380) breakChance *= 0.35;
      if ((k === 'C-C' || k === 'C-O' || k === 'H-O') && ambientTempC < 520) breakChance *= 0.20;
      if (bond.ionic && ambientTempC < 220) breakChance *= 0.30;
      if (bond.core) breakChance *= 0.12;
      if (bond.core && ambientTempC < 120 && sustainedStress < 0.98) breakChance *= 0.05;
      if (mol.type === 'NaOCl' && (k === 'Na-O' || k === 'O-Cl') && ambientTempC < 90) breakChance *= 0.03;
      if (mol.type === 'acetone' && (k === 'C-C' || k === 'C-O') && ambientTempC < 110) breakChance *= 0.03;
      breakChance *= clamp(1.16 - localSat * 0.36, 0.46, 1.08);
      breakChance *= clamp(1.16 - molSat * 0.30, 0.58, 1.08);
      breakChance *= clamp(1.06 - neighborhoodSupport * 0.24, 0.72, 1.02);
      breakChance *= condensedShield;
      if (bond.age > 180 && ambientTempC < 180) breakChance *= 0.82;
      if (Math.random() < breakChance) {
        const host = plainFormula(mol.formula);
        mol.bonds.splice(bi, 1);
        world.stats.reactions += 1;
        addReactionLog(
          'break-bond',
          `${host} broke ${k} bond (stress=${sustainedStress.toFixed(2)}, chance=${breakChance.toFixed(4)})`
        );
        changed = true;
      }
    }

    splitDisconnectedMolecule(mol);
  }

  if (changed) markSidebarDirty();
}

function applyPairForce(a, b, fx, fy) {
  a.fx += fx; a.fy += fy;
  b.fx -= fx; b.fy -= fy;
}

function springBond(a, b, rest, k, damping, strength = 1) {
  if (strength <= 0.0001) return;
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  let d = Math.hypot(dx, dy);
  if (d < 1e-6) d = 1e-6;

  const nx = dx / d;
  const ny = dy / d;
  const relvx = b.vx - a.vx;
  const relvy = b.vy - a.vy;
  const reln = relvx * nx + relvy * ny;
  const f = (k * (d - rest) + damping * reln) * strength;
  applyPairForce(a, b, f * nx, f * ny);
}

function softRepulsion(a, b, minDist, k) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  let d = Math.hypot(dx, dy);
  if (d < 1e-6) d = 1e-6;
  const overlap = minDist - d;
  if (overlap > 0) {
    const nx = dx / d;
    const ny = dy / d;
    const f = -k * overlap;
    applyPairForce(a, b, f * nx, f * ny);
  }
}

function applyElectrostaticForce(a, b, mediumScale = 1) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const d2 = dx * dx + dy * dy;
  if (d2 < 1e-6) return;
  const qProduct = a.charge * b.charge;
  if (Math.abs(qProduct) < 0.0002) return;

  const d = Math.sqrt(d2);
  const nx = dx / d;
  const ny = dy / d;
  const f = clamp((-24 * qProduct * mediumScale) / (d2 + 140), -0.11, 0.11);
  applyPairForce(a, b, f * nx, f * ny);
}

function applyAngleConstraint(mol, con, strength, dt) {
  const c = mol.atoms[con.center];
  const a = mol.atoms[con.a];
  const b = mol.atoms[con.b];

  const a1 = Math.atan2(a.y - c.y, a.x - c.x);
  const a2 = Math.atan2(b.y - c.y, b.x - c.x);

  let diff = a2 - a1;
  while (diff > Math.PI) diff -= TAU;
  while (diff < -Math.PI) diff += TAU;

  const err = diff - con.angle;
  const torque = err * strength;

  a.vx += (-Math.sin(a1) * torque) * dt * 60;
  a.vy += ( Math.cos(a1) * torque) * dt * 60;
  b.vx += ( Math.sin(a2) * torque) * dt * 60;
  b.vy += (-Math.cos(a2) * torque) * dt * 60;
}

function keepMoleculeInsideVessel(mol, b) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const a of mol.atoms) {
    minX = Math.min(minX, a.x - a.r);
    minY = Math.min(minY, a.y - a.r);
    maxX = Math.max(maxX, a.x + a.r);
    maxY = Math.max(maxY, a.y + a.r);
  }

  let pushX = 0, pushY = 0;
  if (minX < b.x + 10) pushX = (b.x + 10 - minX);
  if (maxX > b.x + b.w - 10) pushX = (b.x + b.w - 10 - maxX);
  if (minY < b.y + 10) pushY = (b.y + 10 - minY);
  if (maxY > b.y + b.h - 10) pushY = (b.y + b.h - 10 - maxY);

  if (pushX !== 0 || pushY !== 0) {
    for (const a of mol.atoms) {
      a.x += pushX;
      a.y += pushY;
      if (pushX !== 0) a.vx *= -0.55;
      if (pushY !== 0) a.vy *= -0.55;
    }
  }
}

function nudgeMoleculesTogether(molA, molB, strength, dt) {
  const ca = moleculeCenter(molA);
  const cb = moleculeCenter(molB);
  const dx = cb.x - ca.x;
  const dy = cb.y - ca.y;
  const len = Math.hypot(dx, dy) || 1e-6;
  const nx = dx / len;
  const ny = dy / len;
  const impulse = strength * dt * 60;

  for (const a of molA.atoms) {
    a.vx += nx * impulse;
    a.vy += ny * impulse;
  }
  for (const b of molB.atoms) {
    b.vx -= nx * impulse;
    b.vy -= ny * impulse;
  }
}

function attractMoleculeTowardPoint(mol, point, strength, dt) {
  const center = moleculeCenter(mol);
  const dx = point.x - center.x;
  const dy = point.y - center.y;
  const len = Math.hypot(dx, dy) || 1e-6;
  const nx = dx / len;
  const ny = dy / len;
  const impulse = strength * dt * 60;

  for (const atom of mol.atoms) {
    atom.vx += nx * impulse;
    atom.vy += ny * impulse;
  }
}

function moleculeRadius(mol) {
  const center = moleculeCenter(mol);
  let radius = 18;
  for (const atom of mol.atoms) {
    radius = Math.max(radius, Math.hypot(atom.x - center.x, atom.y - center.y) + atom.r);
  }
  return radius;
}

function buildMoleculeSpatialIndex(molecules, cellSize = 180) {
  const cells = new Map();
  const entries = [];

  for (const mol of molecules) {
    const center = moleculeCenter(mol);
    const radius = moleculeRadius(mol);
    const cellX = Math.floor(center.x / cellSize);
    const cellY = Math.floor(center.y / cellSize);
    const entry = { mol, center, radius, cellX, cellY };
    const key = `${cellX},${cellY}`;
    if (!cells.has(key)) cells.set(key, []);
    cells.get(key).push(entry);
    entries.push(entry);
  }

  return { cellSize, cells, entries };
}

function forEachNearbyMoleculePair(index, maxDist, callback) {
  const seen = new Set();
  const range = Math.max(1, Math.ceil(maxDist / index.cellSize));

  for (const entry of index.entries) {
    for (let gx = entry.cellX - range; gx <= entry.cellX + range; gx++) {
      for (let gy = entry.cellY - range; gy <= entry.cellY + range; gy++) {
        const bucket = index.cells.get(`${gx},${gy}`);
        if (!bucket) continue;

        for (const other of bucket) {
          if (other.mol.id <= entry.mol.id) continue;
          const pairId = `${entry.mol.id}:${other.mol.id}`;
          if (seen.has(pairId)) continue;
          seen.add(pairId);
          callback(entry, other);
        }
      }
    }
  }
}

function getNearbyMoleculeEntries(index, point, maxDist) {
  const matches = [];
  const range = Math.max(1, Math.ceil(maxDist / index.cellSize));
  const cellX = Math.floor(point.x / index.cellSize);
  const cellY = Math.floor(point.y / index.cellSize);

  for (let gx = cellX - range; gx <= cellX + range; gx++) {
    for (let gy = cellY - range; gy <= cellY + range; gy++) {
      const bucket = index.cells.get(`${gx},${gy}`);
      if (!bucket) continue;

      for (const entry of bucket) {
        if (dist(point, entry.center) <= maxDist) matches.push(entry);
      }
    }
  }

  return matches;
}

function applyMoleculeRepulsion(dt) {
  const active = world.molecules.filter(m => m.alive);
  const index = buildMoleculeSpatialIndex(active, 180);

  forEachNearbyMoleculePair(index, 180, (entryA, entryB) => {
    const A = entryA.mol;
    const B = entryB.mol;
    const dx = entryB.center.x - entryA.center.x;
    const dy = entryB.center.y - entryA.center.y;
    const d = Math.hypot(dx, dy) || 1e-6;
    const minDist = entryA.radius + entryB.radius + 12;
    if (d >= minDist) return;
    const nx = dx / d;
    const ny = dy / d;
    const push = ((minDist - d) / minDist) * 0.16 * dt * 60;
    for (const atom of A.atoms) {
      atom.vx -= nx * push;
      atom.vy -= ny * push;
    }
    for (const atom of B.atoms) {
      atom.vx += nx * push;
      atom.vy += ny * push;
    }
  });
}

function canRuleRunAtConditions(rule, ambientTempC, pressureAtm) {
  const min = rule.conditions?.tempMinC;
  const max = rule.conditions?.tempMaxC;
  if (Number.isFinite(min) && ambientTempC < min) return false;
  if (Number.isFinite(max) && ambientTempC > max) return false;
  const pressureMin = rule.conditions?.pressureMinAtm;
  const pressureMax = rule.conditions?.pressureMaxAtm;
  if (Number.isFinite(pressureMin) && pressureAtm < pressureMin) return false;
  if (Number.isFinite(pressureMax) && pressureAtm > pressureMax) return false;
  return true;
}

function findRuleParticipants(rule, anchor, reservedIds, spatialIndex = null) {
  const proximity = rule.conditions?.proximity ?? 140;
  const phase = rule.conditions?.phase || null;
  const participants = [anchor];
  const localReserved = new Set([anchor.id]);
  const anchorCenter = moleculeCenter(anchor);

  if (phase && anchor.phase !== phase) return null;

  for (let i = 1; i < rule.expandedReactants.length; i++) {
    const type = rule.expandedReactants[i];
    let best = null;
    let bestDist = Infinity;
    const candidates = spatialIndex
      ? getNearbyMoleculeEntries(spatialIndex, anchorCenter, proximity * 1.05).map(entry => entry.mol)
      : world.molecules;
    for (const candidate of candidates) {
      if (!candidate.alive || reservedIds.has(candidate.id) || localReserved.has(candidate.id)) continue;
      if (candidate.type !== type) continue;
      if (phase && candidate.phase !== phase) continue;
      const d = dist(anchorCenter, moleculeCenter(candidate));
      if (d <= proximity && d < bestDist) {
        best = candidate;
        bestDist = d;
      }
    }
    if (!best) return null;
    localReserved.add(best.id);
    participants.push(best);
  }

  return participants;
}

function getParticipantCloseness(rule, participants) {
  const proximity = rule.conditions?.proximity ?? 140;
  const anchorCenter = moleculeCenter(participants[0]);
  let total = 0;
  let count = 0;
  for (let i = 1; i < participants.length; i++) {
    const d = dist(anchorCenter, moleculeCenter(participants[i]));
    if (d > proximity * 1.08) return 0;
    total += clamp((proximity - d) / proximity, 0, 1);
    count += 1;
  }
  return count ? total / count : 1;
}

function spawnSpecies(type, x, y) {
  if (type.startsWith('atom-')) return addAtom(type.replace('atom-', ''), x, y, { select: false });
  return addMolecule(type, x, y, { select: false });
}

function executeScriptedReaction(rule, participants) {
  const centers = participants.map(moleculeCenter);
  const velocities = participants.map(moleculeVelocity);
  const center = {
    x: centers.reduce((sum, p) => sum + p.x, 0) / centers.length,
    y: centers.reduce((sum, p) => sum + p.y, 0) / centers.length
  };
  const avgVelocity = {
    vx: velocities.reduce((sum, p) => sum + p.vx, 0) / velocities.length,
    vy: velocities.reduce((sum, p) => sum + p.vy, 0) / velocities.length
  };

  for (const mol of participants) {
    mol.alive = false;
    mol.reactionProgress = {};
  }

  const spawned = [];
  let offsetIndex = 0;
  for (const product of rule.products) {
    const count = Math.max(1, Number(product.count) || 1);
    for (let i = 0; i < count; i++) {
      const angle = (offsetIndex / Math.max(1, rule.products.length + 2)) * TAU;
      const radius = 22 + (offsetIndex % 3) * 14;
      const made = spawnSpecies(
        product.type,
        center.x + Math.cos(angle) * radius + rand(-8, 8),
        center.y + Math.sin(angle) * radius + rand(-8, 8)
      );
      if (made) {
        for (const atom of made.atoms) {
          atom.vx += avgVelocity.vx * 0.4 + rand(-0.6, 0.6);
          atom.vy += avgVelocity.vy * 0.4 + rand(-0.6, 0.6);
        }
        spawned.push(made);
      }
      offsetIndex += 1;
    }
  }

  if (rule.thermalDeltaC) {
    applyThermalImpulse(rule.thermalDeltaC, rule.name || rule.id, {
      x: center.x,
      y: center.y,
      label: reactionEquation(rule),
      log: false,
      source: rule.id
    });
  }

  world.stats.reactions += 1;
  addReactionLog(
    rule.category || 'scripted',
    reactionEquation(rule),
    { thermalDeltaC: rule.thermalDeltaC || 0, source: rule.id, x: center.x, y: center.y }
  );
  markSidebarDirty();
  return spawned;
}

function runScriptedReactions(dt, ambientTempC, pressureAtm) {
  const rules = world.reactionData.reactions || [];
  const reservedIds = new Set();
  const active = world.molecules.filter(m => m.alive);
  const spatialIndex = buildMoleculeSpatialIndex(active, 180);

  for (const rule of rules) {
    if (!canRuleRunAtConditions(rule, ambientTempC, pressureAtm)) continue;
    const decayPerSecond = Math.max(0, Number(rule.kinetics?.decayPerSecond) || 1);
    const progressPerSecond = Math.max(0.05, Number(rule.kinetics?.progressPerSecond) || 0.6);
    const contactThreshold = Math.max(0.1, Number(rule.kinetics?.contactThreshold) || 1);
    const drift = Math.max(0, Number(rule.kinetics?.drift) || 0);
    const anchorType = rule.expandedReactants[0];
    const anchors = world.molecules.filter(m => m.alive && m.type === anchorType && !reservedIds.has(m.id));

    for (const anchor of anchors) {
      anchor.reactionProgress[rule.id] = (anchor.reactionProgress[rule.id] || 0) * Math.max(0, 1 - decayPerSecond * dt);
      const participants = findRuleParticipants(rule, anchor, reservedIds, spatialIndex);
      if (!participants) continue;

      const center = {
        x: participants.reduce((sum, mol) => sum + moleculeCenter(mol).x, 0) / participants.length,
        y: participants.reduce((sum, mol) => sum + moleculeCenter(mol).y, 0) / participants.length
      };
      if (drift > 0) {
        for (const mol of participants) attractMoleculeTowardPoint(mol, center, drift, dt);
      }

      const closeness = getParticipantCloseness(rule, participants);
      if (closeness <= 0) continue;

      anchor.reactionProgress[rule.id] += progressPerSecond * (0.35 + closeness) * dt;
      if (anchor.reactionProgress[rule.id] < contactThreshold) continue;

      anchor.reactionProgress[rule.id] = 0;
      for (const mol of participants) reservedIds.add(mol.id);
      executeScriptedReaction(rule, participants);
    }
  }
}

function applyReactiveMoleculeDrift(dt, ambientTempC) {
  const active = world.molecules.filter(m => m.alive && m.atoms.length > 0);
  const index = buildMoleculeSpatialIndex(active, 180);

  forEachNearbyMoleculePair(index, 260, (entryA, entryB) => {
    const A = entryA.mol;
    const B = entryB.mol;
    const d = dist(entryA.center, entryB.center);
    if (d > 240) return;

    const reactiveA = moleculeReactiveScore(A);
    const reactiveB = moleculeReactiveScore(B);
    const pairReactive = reactiveA + reactiveB;
    const closedPair = isClosedShellMolecule(A) && isClosedShellMolecule(B);
    const waterOrganicPair =
      (A.miscibleGroup === 'water' && B.miscibleGroup === 'organic-light') ||
      (A.miscibleGroup === 'organic-light' && B.miscibleGroup === 'water');
    const bleachAcetonePair =
      (A.type === 'acetone' && B.type === 'NaOCl') ||
      (A.type === 'NaOCl' && B.type === 'acetone');

    if (closedPair && pairReactive < 1.8 && !bleachAcetonePair) return;

    let strength = 0;
    if (waterOrganicPair) {
      strength += clamp((240 - d) / 240, 0, 1) * 0.020;
    }
    if (pairReactive > 1.15) {
      strength += clamp((220 - d) / 220, 0, 1) * clamp(pairReactive * 0.010, 0, 0.030);
    }
    if (bleachAcetonePair) {
      const tempWindow = Math.exp(-Math.pow((ambientTempC - 42) / 34, 2));
      strength += clamp((260 - d) / 260, 0, 1) * (0.030 + tempWindow * 0.060);
    }

    if (strength <= 0.0005) return;
    nudgeMoleculesTogether(A, B, strength, dt);
  });
}

function handleLiquidMixing(dt) {
  const liquids = world.molecules.filter(m => m.phase === 'liquid');
  const index = buildMoleculeSpatialIndex(liquids, 180);

  forEachNearbyMoleculePair(index, 170, (entryA, entryB) => {
    const A = entryA.mol;
    const B = entryB.mol;
    const ca = entryA.center;
    const cb = entryB.center;
    const d = dist(ca, cb);

    if (d > 170) return;

    const sameGroup = A.miscibleGroup === B.miscibleGroup;
    const nearWaterAcetone =
      (A.miscibleGroup === 'water' && B.miscibleGroup === 'organic-light') ||
      (A.miscibleGroup === 'organic-light' && B.miscibleGroup === 'water');
    const bleachAcetonePair =
      (A.type === 'NaOCl' && B.type === 'acetone') ||
      (A.type === 'acetone' && B.type === 'NaOCl');

    const immiscible =
      !sameGroup && !nearWaterAcetone &&
      !(A.miscibleGroup === 'gas' || B.miscibleGroup === 'gas');

    if (immiscible) {
      const dx = cb.x - ca.x;
      const dy = cb.y - ca.y;
      const len = Math.hypot(dx, dy) || 1e-6;
      const nx = dx / len;
      const ny = dy / len;
      const force = (170 - d) * 0.010;

      for (const a of A.atoms) {
        a.vx -= nx * force * dt * 60;
        a.vy -= ny * force * dt * 60;
      }
      for (const a of B.atoms) {
        a.vx += nx * force * dt * 60;
        a.vy += ny * force * dt * 60;
      }
    } else {
      const midY = (ca.y + cb.y) * 0.5;
      const blend = clamp((170 - d) / 170, 0, 1);
      for (const a of A.atoms) a.vy += (midY - a.y) * (0.0009 + blend * 0.0013) * dt * 60;
      for (const a of B.atoms) a.vy += (midY - a.y) * (0.0009 + blend * 0.0013) * dt * 60;
      if (nearWaterAcetone) {
        nudgeMoleculesTogether(A, B, 0.010 + blend * 0.018, dt);
      }
      if (bleachAcetonePair) {
        nudgeMoleculesTogether(A, B, 0.028 + blend * 0.030, dt);
      }
    }
  });
}

function handleDissolution(dt) {
  const waters = world.molecules.filter(m => m.alive && m.phase === 'liquid' && m.miscibleGroup === 'water');
  if (!waters.length) return;

  for (const mol of world.molecules) {
    if (!mol.alive) continue;
    const config = DISSOLUTION_CONFIG[mol.type];
    if (!config) continue;

    const center = moleculeCenter(mol);
    const nearbyWater = waters.filter(w => dist(center, moleculeCenter(w)) <= config.nearRadius);
    const enoughWater = nearbyWater.length >= config.requiredNeighbors;
    const sourcePhases = config.sourcePhases || ['particle'];
    const canDissolveFromCurrentPhase = !mol.dissolved && sourcePhases.includes(mol.phase);

    if (canDissolveFromCurrentPhase && enoughWater) {
      const chance = clamp((0.015 + nearbyWater.length * 0.01) * config.dissolveRate * dt * 60, 0, 0.22);
      if (Math.random() < chance) {
        setMoleculeDissolvedState(mol, true);
        for (const atom of mol.atoms) {
          atom.vx *= 0.45;
          atom.vy *= 0.45;
        }
        const message = mol.type === 'HCl'
          ? 'Hydrogen chloride dissolved into water and ionized'
          : `${mol.display} dissolved into the water phase`;
        addReactionLog('solution', message, { source: mol.type, x: center.x, y: center.y });
      }
      continue;
    }

    if (mol.dissolved && !enoughWater) {
      const chance = clamp(config.precipitateRate * dt * 60, 0, 0.08);
      if (Math.random() < chance) {
        setMoleculeDissolvedState(mol, false);
        addReactionLog('solution', `${mol.display} precipitated out of solution`, { source: mol.type, x: center.x, y: center.y });
      }
    }
  }
}

function handleCarbonation(dt, ambientTempC, pressureAtm) {
  const waters = world.molecules.filter(m => m.alive && m.phase === 'liquid' && m.miscibleGroup === 'water');
  if (!waters.length) return;

  const co2Molecules = world.molecules.filter(m => m.alive && m.type === 'CO2');
  const stirBoost = world.stirring.timeLeft > 0 ? 1.8 : 1;
  const coldBoost = clamp((28 - ambientTempC) / 26, 0, 1.3);
  const warmPenalty = clamp((ambientTempC - 18) / 50, 0, 1.6);

  for (const mol of co2Molecules) {
    const center = moleculeCenter(mol);
    const nearbyWater = waters.filter(w => dist(center, moleculeCenter(w)) <= 145);
